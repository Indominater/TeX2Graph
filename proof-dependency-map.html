<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Proogh</title>
  <link rel="preload" href="fonts/Geist.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face {
      font-family: 'Geist Sans';
      font-style: normal;
      font-weight: 300 700;
      font-display: swap;
      src: url('fonts/Geist.woff2') format('woff2');
    }

    :root {
      color-scheme: dark;
      --canvas-bg: #1c1b22;
      --canvas-bg-dark: #1c1b22;
      --canvas-text: #fbfbfe;
      --bg: var(--canvas-bg);
      --panel: #42414d;
      --ink: #fbfbfe;
      --muted: rgba(251, 251, 254, 0.68);
      --line: #777681;
      --line-strong: rgba(251, 251, 254, 0.74);
      --accent: rgba(10, 132, 255, 1);
      --accent-soft: rgba(10, 132, 255, 0.18);
      --warn: #ffb020;
      --warn-soft: rgba(255, 176, 32, 0.18);
      --true-rgb: 38, 208, 124;
      --true: rgb(var(--true-rgb));
      --true-soft: rgba(var(--true-rgb), 0.17);
      --false-rgb: 255, 92, 108;
      --false: rgb(var(--false-rgb));
      --false-soft: rgba(var(--false-rgb), 0.19);
      --blocked: #b8bfcc;
      --blocked-soft: #30313a;
      --blocked-hatch: #4c4d59;
      --blocked-accent: #f2b84b;
      --blocked-accent-soft: rgba(242, 184, 75, 0.18);
      --blocked-text: rgba(251, 251, 254, 0.84);
      --pending: #6b7280;
      --pending-soft: rgba(251, 251, 254, 0.12);
      --shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
      --text-font-family: 'Geist Sans';
      --text-font-style: normal;
      --text-font-kerning: none;
      --text-font-stretch: normal;
      --text-font-variant-caps: normal;
      --text-letter-spacing: 0px;
      --text-direction: ltr;
      --regular_text: 400;
      --bold_text: 500;
      --black_font: #15141A;
      --white_font: #fbfbfe;
      --white_font_rgb: 251, 251, 254;
      --firefox-menu-bg: #42414d;
      --firefox-menu-border: #777681;
      --firefox-menu-text: var(--white_font);
      --menu_hover_bg: #5e5d69;
      --menu_pressed_bg: #7b7a84;
      --firefox-menu-hover-bg: var(--menu_hover_bg);
      --firefox-menu-active-bg: var(--menu_pressed_bg);
      --firefox-menu-separator: var(--menu_hover_bg);
      --firefox-menu-shadow:
        0 8px 24px rgba(0, 0, 0, 0.32),
        0 0 0 1px rgba(0, 0, 0, 0.10);
      --dialog-overlay-bg: rgba(0, 0, 0, 0.18);
      --status-pending-fill: var(--firefox-menu-bg);
      --status-pending-stroke: var(--firefox-menu-border);
      --status-pending-active-fill: var(--firefox-menu-hover-bg);
      --status-pending-separator: var(--firefox-menu-separator);
      --status-true-fill: #102d23;
      --status-true-stroke: rgba(var(--true-rgb), 0.84);
      --status-true-active-fill: rgba(var(--true-rgb), 0.27);
      --status-true-separator: rgba(var(--true-rgb), 0.38);
      --status-false-fill: #3a1f29;
      --status-false-stroke: rgba(var(--false-rgb), 0.92);
      --status-false-active-fill: rgba(var(--false-rgb), 0.27);
      --status-false-separator: rgba(var(--false-rgb), 0.40);
      --ui-radius: 25px;
      --menu-shell-radius: var(--ui-radius);
      --menu-shell-padding: 8px;
      --menu-item-height: 32px;
      --menu-item-padding: 0 8px;
      --menu-item-radius: var(--ui-radius);
      --menu-item-font-size: 13px;
      --menu-item-letter-spacing: var(--text-letter-spacing);
      --menu-item-line-height: 32px;
      --menu-separator-gap: 8px;
      --context-menu-width: 224px;
      --smooth-slide-duration: 220ms;
      --smooth-slide-ease: cubic-bezier(0.18, 0.9, 0.24, 1.18);
      --highlight-nudge-x: 2px;
      --selection-outline: rgba(10, 132, 255, 1);
      --selection-highlight: rgba(10, 132, 255, 0.3);
      --danger-text: var(--false);
      --danger-bg: var(--false-soft);
      --danger-hover-bg: rgba(var(--false-rgb), 0.26);
      --danger-active-bg: rgba(var(--false-rgb), 0.34);
      --safe-area-left: env(safe-area-inset-left, 0px);
      --safe-area-right: env(safe-area-inset-right, 0px);
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      min-height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font: var(--text-font-style) var(--regular_text) var(--menu-item-font-size) var(--text-font-family);
      font-kerning: var(--text-font-kerning);
      font-stretch: var(--text-font-stretch);
      font-variant-caps: var(--text-font-variant-caps);
      letter-spacing: var(--text-letter-spacing);
      direction: var(--text-direction);
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app,
    .app * {
      cursor: default;
    }

    button,
    input,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 0;
      border-radius: var(--ui-radius);
      background: transparent;
      color: inherit;
      min-height: var(--menu-item-height);
      padding: var(--menu-item-padding);
      cursor: default;
      outline: none;
    }

    button:hover {
      background: var(--firefox-menu-hover-bg);
    }

    button.primary {
      background: var(--firefox-menu-hover-bg);
      color: var(--firefox-menu-text);
    }

    button.primary:hover {
      background: var(--firefox-menu-active-bg);
    }

    button.icon {
      width: 34px;
      padding: 0;
      display: inline-grid;
      place-items: center;
    }

    .app {
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
    }

    .topbar {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      padding: 0;
      border: 0;
      opacity: 0;
      pointer-events: none;
    }

    .brand {
      font-weight: 740;
      font-size: 17px;
      white-space: nowrap;
      color: #111827;
    }

    .toolbar {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    textarea:focus {
      border-color: var(--selection-outline);
      box-shadow: 0 0 0 2px var(--selection-highlight);
    }

    .workspace {
      position: relative;
      display: block;
      min-height: 0;
      overflow: hidden;
      background: var(--canvas-bg);
    }

    .sidebar {
      position: absolute;
      left: 12px;
      top: 12px;
      bottom: 12px;
      z-index: 4;
      width: min(390px, calc(100vw - 24px));
      min-height: 0;
      display: none;
      grid-template-rows: auto minmax(210px, 0.52fr) auto minmax(180px, 0.48fr);
      background: var(--firefox-menu-bg);
      border: 1px solid var(--firefox-menu-border);
      border-radius: var(--menu-shell-radius);
      box-shadow: var(--firefox-menu-shadow);
      color: var(--firefox-menu-text);
      padding: var(--menu-shell-padding);
      overflow: hidden;
      isolation: isolate;
      -webkit-mask-image: -webkit-radial-gradient(white, black);
      mask-image: radial-gradient(white, black);
    }

    .section-head {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: var(--menu-item-padding);
      border-bottom: 1px solid var(--firefox-menu-separator);
      color: var(--muted);
      font-size: var(--menu-item-font-size);
      font-weight: var(--bold_text);
      text-transform: uppercase;
      line-height: var(--menu-item-line-height);
    }

    .source-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-transform: none;
      font-weight: var(--regular_text);
      color: rgba(var(--white_font_rgb), 0.72);
    }

    textarea {
      resize: none;
      width: 100%;
      height: 100%;
      border: 0;
      border-bottom: 1px solid var(--firefox-menu-separator);
      padding: 10px 8px;
      outline: none;
      color: var(--firefox-menu-text);
      background: transparent;
      font: 12.5px/1.45 var(--text-font-family);
      letter-spacing: 0;
      user-select: text;
      -webkit-user-select: text;
      scrollbar-color: var(--firefox-menu-border) transparent;
    }

    textarea::placeholder {
      color: rgba(var(--white_font_rgb), 0.46);
    }

    .settings {
      padding: 8px 0;
      border-bottom: 1px solid var(--firefox-menu-separator);
      display: grid;
      gap: 10px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0;
      padding: 0 8px;
    }

    .stat {
      border: 0;
      border-radius: var(--ui-radius);
      padding: 7px 8px;
      background: transparent;
      min-width: 0;
      transition:
        background-color var(--smooth-slide-duration) var(--smooth-slide-ease),
        transform var(--smooth-slide-duration) var(--smooth-slide-ease);
    }

    .stat:hover {
      background: var(--firefox-menu-hover-bg);
      transform: translateX(var(--highlight-nudge-x));
    }

    .stat b {
      display: block;
      color: var(--firefox-menu-text);
      font-size: 16px;
      font-weight: var(--bold_text);
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: rgba(var(--white_font_rgb), 0.76);
      font-size: 12px;
      align-items: center;
      padding: 0 8px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: var(--ui-radius);
      border: 1px solid var(--line-strong);
      background: rgba(var(--white_font_rgb), 0.08);
      flex: 0 0 auto;
    }

    .swatch.final {
      border: 3px double var(--warn);
      background: var(--warn-soft);
    }

    .swatch.false {
      border-color: var(--false);
      background: var(--false-soft);
    }

    .swatch.blocked {
      border-color: var(--blocked);
      background:
        linear-gradient(90deg, var(--blocked-accent-soft), transparent 58%),
        repeating-linear-gradient(
          135deg,
          var(--blocked-soft) 0 8px,
          var(--blocked-hatch) 8px 11px,
          var(--blocked-soft) 11px 18px
        );
      box-shadow: inset 3px 0 0 var(--blocked-accent);
    }

    .details {
      min-height: 0;
      overflow: auto;
      padding: 10px 8px;
      background: transparent;
      scrollbar-color: var(--firefox-menu-border) transparent;
    }

    .details h2 {
      margin: 0 0 4px;
      color: var(--firefox-menu-text);
      font-size: 15px;
      font-weight: var(--bold_text);
      line-height: 1.25;
      letter-spacing: 0;
    }

    .details .meta {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
      margin-bottom: 10px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 9px 0 12px;
    }

    .pill {
      border: 1px solid rgba(var(--white_font_rgb), 0.18);
      border-radius: var(--ui-radius);
      padding: 4px 9px;
      font-size: 12px;
      color: rgba(var(--white_font_rgb), 0.82);
      background: transparent;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .pill.status-true {
      border-color: rgba(var(--true-rgb), 0.36);
      background: var(--true-soft);
      color: var(--true);
    }

    .pill.status-false {
      border-color: rgba(var(--false-rgb), 0.42);
      background: var(--danger-bg);
      color: var(--danger-text);
    }

    .pill.status-pending {
      border-color: rgba(var(--white_font_rgb), 0.18);
      background: var(--pending-soft);
      color: rgba(var(--white_font_rgb), 0.78);
    }

    .pill.status-blocked {
      border-color: rgba(156, 163, 175, 0.55);
      background:
        linear-gradient(90deg, var(--blocked-accent-soft), transparent 60%),
        repeating-linear-gradient(
          135deg,
          var(--blocked-soft) 0 8px,
          var(--blocked-hatch) 8px 11px,
          var(--blocked-soft) 11px 18px
        );
      color: var(--blocked-text);
    }

    .link-list {
      display: grid;
      gap: 5px;
      margin: 8px 0 14px;
    }

    .link-list button {
      min-height: 30px;
      height: auto;
      padding: var(--menu-item-padding);
      text-align: left;
      display: block;
      overflow-wrap: anywhere;
      color: var(--firefox-menu-text);
      background: transparent;
      transition:
        background-color var(--smooth-slide-duration) var(--smooth-slide-ease),
        transform var(--smooth-slide-duration) var(--smooth-slide-ease);
    }

    .link-list button:hover {
      background: var(--firefox-menu-hover-bg);
      transform: translateX(var(--highlight-nudge-x));
    }

    .snippet {
      border: 1px solid rgba(var(--white_font_rgb), 0.14);
      border-radius: var(--ui-radius);
      background: rgba(var(--white_font_rgb), 0.06);
      color: rgba(var(--white_font_rgb), 0.78);
      padding: 9px;
      max-height: 180px;
      overflow: auto;
      white-space: pre-wrap;
      font: 12px/1.45 var(--text-font-family);
      user-select: text;
      -webkit-user-select: text;
    }

    .graph-pane {
      position: absolute;
      inset: 0;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      background: var(--canvas-bg);
    }

    .graph-statusbar {
      min-height: 42px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--firefox-menu-separator);
      background: var(--firefox-menu-bg);
      z-index: 2;
    }

    .graph-statusbar .summary {
      color: var(--muted);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      flex: 0 0 auto;
    }

    .zoom-controls input {
      accent-color: var(--accent);
      width: 120px;
    }

    .graph-scroll {
      min-height: 0;
      overflow: hidden;
      position: relative;
      cursor: default;
      touch-action: none;
      user-select: none;
      background: var(--canvas-bg);
    }

    .graph-scroll.space-pan,
    .graph-scroll.panning {
      cursor: default;
    }

    #graphSvg {
      display: block;
      min-width: 100%;
      min-height: 100%;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      pointer-events: none;
      text-align: center;
      padding: 24px;
    }

    .empty-state strong {
      display: block;
      color: var(--firefox-menu-text);
      font-size: 18px;
      margin-bottom: 5px;
    }

    .notice {
      position: fixed;
      left: 50%;
      bottom: calc(96px + var(--safe-area-bottom));
      z-index: 99998;
      width: min(420px, calc(100vw - var(--safe-area-left) - var(--safe-area-right) - 24px));
      padding: 10px 14px;
      border: 1px solid var(--firefox-menu-border);
      border-radius: var(--menu-shell-radius);
      background: var(--firefox-menu-bg);
      box-shadow: var(--firefox-menu-shadow);
      color: var(--firefox-menu-text);
      font-weight: var(--bold_text);
      line-height: 1.35;
      text-align: center;
      opacity: 0;
      transform: translate(-50%, 8px);
      transition:
        opacity 160ms ease,
        transform 160ms ease;
      pointer-events: none;
    }

    .notice.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .edge {
      fill: none;
      stroke: rgba(251, 251, 254, 0.28);
      stroke-width: 1;
      opacity: 0.82;
      vector-effect: non-scaling-stroke;
    }

    .edge.relation {
      stroke: var(--selection-outline);
      stroke-width: 1;
      opacity: 1;
    }

    .edge.relation.direct {
      stroke: var(--selection-outline);
      stroke-width: 1;
      stroke-dasharray: none;
      opacity: 0.98;
    }

    .edge.relation.indirect:not(.direct) {
      stroke: rgba(251, 251, 254, 0.28);
      stroke-width: 1;
      stroke-dasharray: none;
      opacity: 0.82;
    }

    .edge.dependency {
      stroke-dasharray: none;
    }

    .edge.dependent {
      stroke-dasharray: none;
    }

    .edge.blocked {
      stroke: var(--blocked);
      stroke-width: 1;
      stroke-dasharray: none;
      opacity: 0.78;
    }

    .edge.blocked.relation {
      stroke: var(--blocked);
      opacity: 1;
    }

    .edge.blocked.relation.indirect:not(.direct) {
      opacity: 0.78;
    }

    .edge.false-source,
    .edge.false-source.blocked,
    .edge.false-source.relation {
      stroke: var(--status-false-stroke);
      opacity: 1;
    }

    .edge.unrelated,
    .edge.blocked.unrelated,
    .edge.false-source.unrelated,
    .edge.false-source.blocked.unrelated {
      opacity: 0.16;
    }

    .node {
      --status-fill: var(--status-pending-fill);
      --status-stroke: var(--status-pending-stroke);
      cursor: default;
    }

    .status-slider {
      --status-fill: var(--status-pending-fill);
      --status-stroke: var(--status-pending-stroke);
      --status-active-fill: var(--status-pending-active-fill);
      --status-separator-color: var(--status-pending-separator);
    }

    .status-slider.status-true {
      --status-fill: var(--status-true-fill);
      --status-stroke: var(--status-true-stroke);
      --status-active-fill: var(--status-true-active-fill);
      --status-separator-color: var(--status-true-separator);
    }

    .status-slider.status-false {
      --status-fill: var(--status-false-fill);
      --status-stroke: var(--status-false-stroke);
      --status-active-fill: var(--status-false-active-fill);
      --status-separator-color: var(--status-false-separator);
    }

    .node:focus {
      outline: none;
    }

    .node.unrelated {
      opacity: 0.16;
    }

    .node.relation.direct {
      opacity: 1;
    }

    .node.relation.indirect:not(.direct) {
      opacity: 1;
    }

    .node.relation .body {
      stroke-width: 1;
    }

    .node.relation.direct .body {
      stroke-width: 1;
      stroke-dasharray: none;
    }

    .node.relation.indirect:not(.direct) .body {
      stroke-width: 1;
      stroke-dasharray: none;
    }

    .node.relation.direct .selection-frame {
      opacity: 1;
      stroke: var(--selection-outline);
      stroke-width: 1;
      stroke-dasharray: none;
    }

    .node.relation.indirect:not(.direct) .selection-frame {
      opacity: 0;
      stroke-dasharray: none;
    }

    .node.dependency .body {
      stroke-dasharray: none;
    }

    .node.dependent .body {
      stroke-dasharray: none;
    }

    .node .body {
      fill: var(--status-fill);
      stroke: var(--status-stroke);
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
    }

    .node .selection-frame {
      fill: none;
      stroke: var(--selection-outline);
      stroke-width: 1;
      opacity: 0;
      pointer-events: none;
      vector-effect: non-scaling-stroke;
    }

    .node:focus-visible .selection-frame,
    .node.selected .selection-frame {
      opacity: 1;
    }

    .node.blocked .body {
      fill: var(--canvas-bg);
      stroke: var(--status-stroke);
      stroke-width: 1;
      stroke-dasharray: none;
    }

    .node.final .body {
      stroke-width: 1;
    }

    .node.selected {
      opacity: 1;
      filter: none;
    }

    .node.selected.relation.direct .body,
    .node.selected.relation.indirect .body,
    .node.selected.blocked .body,
    .node.selected .body {
      stroke-width: 1;
      stroke-dasharray: none;
    }

    .node.selected.relation.direct .selection-frame,
    .node.selected.relation.indirect .selection-frame,
    .node.selected .selection-frame {
      opacity: 1;
      stroke: var(--selection-outline);
      stroke-width: 2;
      stroke-dasharray: none;
    }

    .node .title {
      font-weight: var(--bold_text);
      fill: var(--firefox-menu-text);
      font-size: var(--menu-item-font-size);
    }

    .node .id {
      fill: rgba(var(--white_font_rgb), 0.68);
      font-size: var(--menu-item-font-size);
    }

    .node .type {
      fill: rgba(var(--white_font_rgb), 0.78);
      font-size: var(--menu-item-font-size);
      font-weight: var(--bold_text);
      text-transform: uppercase;
    }

    .node .final-mark {
      fill: var(--warn);
    }

    .status-slider {
      cursor: default;
      pointer-events: all;
      touch-action: none;
      outline: none;
    }

    .status-slider * {
      pointer-events: none;
    }

    .status-slider .slider-hitbox {
      fill: transparent;
      pointer-events: all;
    }

    .status-slider .status-shell {
      fill: var(--status-fill);
      stroke: var(--status-stroke);
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
    }

    .status-slider .status-action {

  <script id="app-script">
    "use strict";

    const SKIPPED_PROOF_ENVS = new Set(["document", "proof"]);

    const ZOOM_MAX = 100;
    const MENU_VIEWPORT_EDGE_MARGIN = 12;
    const PINNED_CONTEXT_MENU_EDGE_OFFSET = MENU_VIEWPORT_EDGE_MARGIN;
    const TOUCH_GESTURE_MOVE_THRESHOLD = 5;
    const TOUCH_CLICK_SUPPRESS_MS = 320;
    const GRAPH_DATA_KIND = "tex-proof-graph";
    const LEGACY_MAP_DATA_KIND = "tex-proof-map";
    const SMOOTH_SLIDE_DURATION_MS =
      Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--smooth-slide-duration")) || 220;
    const MENU_ITEM_FONT_SIZE = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--menu-item-font-size")) || 13;
    const NODE_TEXT_WIDTH = NODE_W - BOARD_SHELL_PADDING * 4;
    const NODE_TITLE_FALLBACK_MAX_CHARS = Math.max(18, Math.floor(NODE_TEXT_WIDTH / (MENU_ITEM_FONT_SIZE * 0.5)));
    const NODE_ID_MAX_CHARS = Math.max(18, Math.floor(NODE_TEXT_WIDTH / (MENU_ITEM_FONT_SIZE * 0.62)));
    const BOARDFISH_ACTION_ICON_SIZE = 20;
    const STATUS_ACTION_SCALE = MENU_ITEM_FONT_SIZE / BOARDFISH_ACTION_ICON_SIZE;
    const STATUS_ACTION_SIZE = Math.round(BOARD_ITEM_SIZE * STATUS_ACTION_SCALE);
    const STATUS_ACTION_PADDING = Math.round(BOARD_SHELL_PADDING * STATUS_ACTION_SCALE);

      leftX: STATUS_ACTION_BORDER_INSET + STATUS_ACTION_PADDING + STATUS_ACTION_SIZE / 2,

        STATUS_ACTION_BORDER_INSET +

        STATUS_ACTION_SEPARATOR_GAP * 2 +

    };
    const COPY_JIGGLE_DEFAULTS = Object.freeze({
      duration: 500,

    const els = {

    };

    function lineStartsFor(text) {
      const starts = [0];
      for (let i = 0; i < text.length; i += 1) {
        if (text[i] === "\n") starts.push(i + 1);
      }
      return starts;
    }

    function lineFromIndex(starts, index) {
      let lo = 0;
      let hi = starts.length - 1;
      while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (starts[mid] <= index) lo = mid + 1;
        else hi = mid - 1;
      }
      return hi + 1;
    }

    function escapedAt(text, index) {
      let count = 0;
      for (let i = index - 1; i >= 0 && text[i] === "\\"; i -= 1) count += 1;
      return count % 2 === 1;
    }

    function stripComments(text) {
      let out = "";
      let inComment = false;
      for (let i = 0; i < text.length; i += 1) {
        const ch = text[i];
        if (ch === "\n") {
          inComment = false;
          out += ch;
        } else if (inComment) {
          out += " ";
        } else if (ch === "%" && !escapedAt(text, i)) {
          inComment = true;
          out += " ";
        } else {
          out += ch;
        }
      }
      return out;
    }

    function readOptionalBracket(text, index) {
      let i = index;
      while (i < text.length && /\s/.test(text[i])) i += 1;
      if (text[i] !== "[") return { value: "", end: index };
      let depth = 0;
      let value = "";
      for (; i < text.length; i += 1) {
        const ch = text[i];
        if (ch === "[" && !escapedAt(text, i)) {
          if (depth > 0) value += ch;
          depth += 1;
        } else if (ch === "]" && !escapedAt(text, i)) {
          depth -= 1;
          if (depth === 0) return { value, end: i + 1 };
          value += ch;
        } else {
          value += ch;
        }
      }
      return { value: "", end: index };
    }

    function normalizeEnv(env) {
      return env.toLowerCase().replace(/\*$/, "");
    }

    function discoverProofEnvironments(tex) {
      const envs = new Set();
      const newTheorem = /\\newtheorem\s*\*?\s*\{\s*([^}]+?)\s*\}/g;
      let match;
      while ((match = newTheorem.exec(tex))) envs.add(normalizeEnv(match[1].trim()));
      return Array.from(envs).filter((env) => env && !SKIPPED_PROOF_ENVS.has(env));
    }

    function findEnvironmentEnd(text, env, start) {
      const targetEnv = normalizeEnv(env);
      const tag = /\\(begin|end)\s*\{\s*([^}]+?)\s*\}/g;
      tag.lastIndex = start;
      let depth = 1;
      let match;
      while ((match = tag.exec(text))) {
        if (normalizeEnv(match[2].trim()) !== targetEnv) continue;
        depth += match[1] === "begin" ? 1 : -1;
        if (depth === 0) return { start: match.index, end: tag.lastIndex };
      }
      return null;
    }

    function findProofBlockBefore(text, start, end) {
      const proofBegin = /\\begin\s*\{\s*proof\s*\}/g;
      proofBegin.lastIndex = start;
      const match = proofBegin.exec(text);
      if (!match || match.index >= end) return null;
      const proofEnd = findEnvironmentEnd(text, "proof", proofBegin.lastIndex);
      return {
        start: match.index,
        end: proofEnd ? Math.min(proofEnd.end, end) : end
      };
    }

    function cleanTitle(value) {
      return value
        .replace(/\\label\s*\{[^}]+\}/g, "")
        .replace(/\\texorpdfstring\s*\{([^}]*)\}\s*\{([^}]*)\}/g, "$1")
        .replace(/\s+/g, " ")
        .trim();
    }

    function humanType(env) {
      const base = normalizeEnv(env);
      if (base === "externalinput") return "External input";
      return base.replace(/(^|[-_\s])([a-z])/g, (_, sep, ch) => (sep ? " " : "") + ch.toUpperCase()).trim();
    }

    function isStructuralLabel(label) {
      return /(^|:)(eq|equation|sec|subsec|subsection|fig|figure|tab|table|app|appendix|alg|algorithm|lst|listing):/i.test(label);
    }

    function isEquationLabel(label) {
      return /(^|:)(eq|equation):/i.test(label);
    }

    function envLabelPattern(env) {
      const base = normalizeEnv(env);
      const map = {
        theorem: /(^|:)(thm|theorem):/i,
        lemma: /(^|:)(lem|lemma):/i,
        proposition: /(^|:)(prop|proposition):/i,
        corollary: /(^|:)(cor|corr|corollary):/i,
        claim: /(^|:)claim:/i,
        definition: /(^|:)(def|definition):/i,
        conjecture: /(^|:)(conj|conjecture):/i,
        remark: /(^|:)(rem|remark):/i,
        externalinput: /(^|:)(ext|external|input):/i,
        certificate: /(^|:)(cert|certificate):/i,
        assumption: /(^|:)(ass|assump|assumption):/i,
        fact: /(^|:)fact:/i,
        axiom: /(^|:)axiom:/i
      };
      return map[base] || null;
    }

    function theoremLikeLabel(label, env) {
      const pattern = envLabelPattern(env);
      if (pattern && pattern.test(label)) return true;
      return !isStructuralLabel(label) && /(^|:)(thm|theorem|lem|lemma|prop|proposition|cor|corollary|claim|def|definition|conj|remark|rem|ext|cert|assumption|fact|axiom):/i.test(label);
    }

    function unique(values) {
      return Array.from(new Set(values.filter(Boolean)));
    }

    function labelsIn(text) {
      const labels = [];
      const re = /\\label\s*\{([^}]+)\}/g;
      let match;
      while ((match = re.exec(text))) labels.push(match[1].trim());
      return labels;
    }

    function refLabelsIn(text) {
      const labels = [];
      const re = /\\(?:eqref|Cref|cref|autoref|nameref|Vref|vref|subref|ref)\s*\{([^}]+)\}/g;
      let match;
      while ((match = re.exec(text))) {
        match[1].split(",")
          .map((value) => value.trim())
          .filter(Boolean)
          .forEach((label) => labels.push(label));
      }
      return unique(labels);
    }

    function labelsAttachedToBegin(text, index) {
      let i = index;
      const optional = readOptionalBracket(text, i);
      if (optional.end !== i) i = optional.end;
      const labels = [];
      while (i < text.length) {
        while (i < text.length && /\s/.test(text[i])) i += 1;
        const match = /^\\label\s*\{([^}]+)\}/.exec(text.slice(i));
        if (!match) break;
        labels.push(match[1].trim());
        i += match[0].length;
      }
      return labels;
    }

    function addOwner(map, key, id) {
      if (!key) return;
      if (!map.has(key)) map.set(key, []);
      const owners = map.get(key);
      if (!owners.includes(id)) owners.push(id);
    }

    function firstExternalOwner(map, key, fromId) {
      return (map.get(key) || []).find((id) => id !== fromId) || "";
    }

    function choosePrimaryLabel(labels, env) {
      const pattern = envLabelPattern(env);
      if (pattern) {
        const exact = labels.find((label) => pattern.test(label));
        if (exact) return exact;
      }
      const theoremLike = labels.find((label) => theoremLikeLabel(label, env));
      if (theoremLike) return theoremLike;
      const nonStructural = labels.find((label) => !isStructuralLabel(label));
      return nonStructural || "";
    }

    function snippetFor(block) {
      return block
        .replace(/\s+/g, " ")
        .trim()
        .slice(0, 650);
    }

    function parseTex(tex, priorStatuses = {}) {
      const stripped = stripComments(tex);
      const starts = lineStartsFor(stripped);
      const envSet = new Set(discoverProofEnvironments(stripped));
      const begin = /\\begin\s*\{\s*([^}]+?)\s*\}/g;
      const counters = new Map();
      const blockStarts = [];
      const blocks = [];
      let match;

      while ((match = begin.exec(stripped))) {
        const rawEnv = match[1].trim();
        const env = normalizeEnv(rawEnv);
        if (!envSet.has(env)) continue;
        blockStarts.push({
          index: match.index,
          beginEnd: begin.lastIndex,
          rawEnv,
          env
        });
      }

      blockStarts.forEach((blockStart, index) => {
        const { rawEnv, env } = blockStart;
        const nextBlock = blockStarts[index + 1];
        const nextBlockStart = nextBlock ? nextBlock.index : stripped.length;
        const optional = readOptionalBracket(stripped, blockStart.beginEnd);
        const contentStart = optional.end === blockStart.beginEnd ? blockStart.beginEnd : optional.end;
        const theoremEnd = findEnvironmentEnd(stripped, rawEnv, blockStart.beginEnd);
        const theoremBlockEnd = theoremEnd ? Math.min(theoremEnd.end, nextBlockStart) : nextBlockStart;
        const proofBlock = findProofBlockBefore(stripped, theoremBlockEnd, nextBlockStart);
        const blockEnd = proofBlock ? proofBlock.end : theoremBlockEnd;
        const nodeBlock = stripped.slice(blockStart.index, blockEnd);
        const body = stripped.slice(contentStart, blockEnd);
        const labels = unique(labelsAttachedToBegin(stripped, blockStart.beginEnd));
        const allLabels = unique(labelsIn(nodeBlock));
        const refLabels = refLabelsIn(nodeBlock);
        const equationLabels = allLabels.filter(isEquationLabel);
        const title = cleanTitle(optional.value) || humanType(env) + " " + ((counters.get(env) || 0) + 1);
        counters.set(env, (counters.get(env) || 0) + 1);
        blocks.push({
          env,
          title,
          labels,
          allLabels,
          equationLabels,
          refLabels,
          body,
          block: nodeBlock,
          startIndex: blockStart.index,
          line: lineFromIndex(starts, blockStart.index)
        });
      });

      const usedIds = new Map();
      const nodes = blocks.map((block, index) => {
        let id = choosePrimaryLabel(block.labels, block.env);
        if (!id) id = "unlabeled:" + block.env + ":" + (index + 1);
        const seen = usedIds.get(id) || 0;
        usedIds.set(id, seen + 1);
        const uniqueId = seen ? id + "::" + (seen + 1) : id;
        const aliases = unique(block.labels.filter((label) => theoremLikeLabel(label, block.env)));
        if (!aliases.includes(uniqueId) && !uniqueId.startsWith("unlabeled:")) aliases.unshift(uniqueId);
        const ownedLabels = unique([...aliases, ...block.equationLabels]);
        return {
          id: uniqueId,
          originalId: id,
          title: block.title,
          type: block.env,
          line: block.line,
          labels: block.labels,
          allLabels: block.allLabels,
          equationLabels: block.equationLabels,
          aliases,
          ownedLabels,
          refLabels: block.refLabels,
          dependsOn: [],
          dependents: [],
          status: priorStatuses[uniqueId] || priorStatuses[id] || "pending",
          snippet: snippetFor(block.block),
          x: 0,
          y: 0,
          isLeaf: false,
          isFinal: false,
          blocked: false
        };
      });

      const labelToIds = new Map();
      const duplicateLabels = [];
      for (const node of nodes) {
        for (const label of node.allLabels) {
          const existingOwner = firstExternalOwner(labelToIds, label, node.id);
          if (existingOwner) {
            duplicateLabels.push({ label, first: existingOwner, second: node.id });
          }
          addOwner(labelToIds, label, node.id);
        }
      }

      const unresolvedRefs = [];
      for (const node of nodes) {
        const deps = [];
        for (const label of node.refLabels) {
          const target = firstExternalOwner(labelToIds, label, node.id);
          if (target) deps.push(target);
          else if (!isStructuralLabel(label)) unresolvedRefs.push({ from: node.id, ref: label });
        }
        node.dependsOn = unique(deps);
      }

      const edges = [];
      const byId = new Map(nodes.map((node) => [node.id, node]));
      for (const node of nodes) {
        for (const depId of node.dependsOn) {
          const dep = byId.get(depId);
          if (!dep) continue;
          dep.dependents.push(node.id);
          edges.push({ from: depId, to: node.id });
        }
      }

      for (const node of nodes) {
        node.isLeaf = node.dependsOn.length === 0;
        node.isFinal = node.dependents.length === 0;
      }

      return { nodes, edges: uniqueEdges(edges), duplicateLabels, unresolvedRefs };
    }

    function stronglyConnectedComponents(nodes, edges) {
      const nodeIds = new Set(nodes.map((node) => node.id));
      const adjacency = new Map(nodes.map((node) => [node.id, []]));
      for (const edge of edges) {
        if (nodeIds.has(edge.from) && nodeIds.has(edge.to)) adjacency.get(edge.from).push(edge.to);
      }

      const components = [];
      const indices = new Map();
      const lowlinks = new Map();
      const stack = [];
      const onStack = new Set();
      let nextIndex = 0;

      function visit(id) {
        indices.set(id, nextIndex);
        lowlinks.set(id, nextIndex);
        nextIndex += 1;
        stack.push(id);
        onStack.add(id);

        for (const next of adjacency.get(id) || []) {
          if (!indices.has(next)) {
            visit(next);
            lowlinks.set(id, Math.min(lowlinks.get(id), lowlinks.get(next)));
          } else if (onStack.has(next)) {
            lowlinks.set(id, Math.min(lowlinks.get(id), indices.get(next)));
          }
        }

        if (lowlinks.get(id) !== indices.get(id)) return;
        const component = [];
        while (stack.length) {
          const member = stack.pop();
          onStack.delete(member);
          component.push(member);
          if (member === id) break;
        }
        components.push(component);
      }

      for (const node of nodes) {
        if (!indices.has(node.id)) visit(node.id);
      }
      return components;
    }

    function compareNodeIdsByLine(a, b, byId) {
      const nodeA = byId.get(a);
      const nodeB = byId.get(b);
      return (nodeA?.line ?? 0) - (nodeB?.line ?? 0) || String(a).localeCompare(String(b));
    }

    function orderCyclicComponent(component, edges, byId) {
      const remaining = new Set(component);
      const internalEdges = edges.filter((edge) => remaining.has(edge.from) && remaining.has(edge.to));
      const front = [];
      const back = [];

      function degree(id) {
        let incoming = 0;
        let outgoing = 0;
        for (const edge of internalEdges) {
          if (!remaining.has(edge.from) || !remaining.has(edge.to)) continue;
          if (edge.from === id) outgoing += 1;
          if (edge.to === id) incoming += 1;
        }
        return { incoming, outgoing };
      }

      while (remaining.size) {
        let changed = true;
        while (changed) {
          changed = false;
          const sinks = Array.from(remaining)
            .filter((id) => degree(id).outgoing === 0)
            .sort((a, b) => compareNodeIdsByLine(b, a, byId));
          for (const id of sinks) {
            if (!remaining.has(id)) continue;
            remaining.delete(id);
            back.unshift(id);
            changed = true;
          }

          const sources = Array.from(remaining)
            .filter((id) => degree(id).incoming === 0)
            .sort((a, b) => compareNodeIdsByLine(a, b, byId));
          for (const id of sources) {
            if (!remaining.has(id)) continue;
            remaining.delete(id);
            front.push(id);
            changed = true;
          }
        }

        if (!remaining.size) break;
        const best = Array.from(remaining)
          .sort((a, b) => {
            const degreeA = degree(a);
            const degreeB = degree(b);
            return (degreeB.outgoing - degreeB.incoming) - (degreeA.outgoing - degreeA.incoming)
              || compareNodeIdsByLine(a, b, byId);
          })[0];
        remaining.delete(best);
        front.push(best);
      }

      return front.concat(back);
    }

    function topoLayout(nodes, edges) {
      const byId = new Map(nodes.map((node) => [node.id, node]));
      const components = stronglyConnectedComponents(nodes, edges);
      const componentById = new Map();
      components.forEach((component, index) => {
        component.forEach((id) => componentById.set(id, index));
      });

      const memberLevels = new Map();
      const componentSpan = components.map((component) => {
        if (component.length === 1) {
          memberLevels.set(component[0], 0);
          return 1;
        }

        const ordered = orderCyclicComponent(component, edges, byId);
        ordered.forEach((id, index) => memberLevels.set(id, index));
        return ordered.length || 1;
      });

      const outgoing = new Map(components.map((_, index) => [index, new Set()]));
      const indegree = new Map(components.map((_, index) => [index, 0]));
      const componentGaps = new Map();
      for (const edge of edges) {
        const fromComponent = componentById.get(edge.from);
        const toComponent = componentById.get(edge.to);
        if (fromComponent === undefined || toComponent === undefined || fromComponent === toComponent) continue;
        const exits = outgoing.get(fromComponent);
        if (!exits.has(toComponent)) {
          exits.add(toComponent);
          indegree.set(toComponent, (indegree.get(toComponent) || 0) + 1);
        }
        const key = fromComponent + "->" + toComponent;
        const requiredGap = Math.max(1, (memberLevels.get(edge.from) || 0) - (memberLevels.get(edge.to) || 0) + 1);
        componentGaps.set(key, Math.max(componentGaps.get(key) || 1, requiredGap));
      }

      const componentStart = new Map(components.map((_, index) => [index, 0]));
      const componentLine = components.map((component) => Math.min(...component.map((id) => byId.get(id)?.line ?? 0)));
      const queue = components
        .map((_, index) => index)
        .filter((index) => (indegree.get(index) || 0) === 0)
        .sort((a, b) => componentLine[a] - componentLine[b]);

      for (let cursor = 0; cursor < queue.length; cursor += 1) {
        const component = queue[cursor];
        for (const next of outgoing.get(component) || []) {
          const requiredStart = (componentStart.get(component) || 0) + (componentGaps.get(component + "->" + next) || componentSpan[component] || 1);
          if ((componentStart.get(next) || 0) < requiredStart) componentStart.set(next, requiredStart);
          indegree.set(next, (indegree.get(next) || 0) - 1);
          if ((indegree.get(next) || 0) === 0) {
            queue.push(next);
            const pending = queue.splice(cursor + 1);
            pending.sort((a, b) => (componentStart.get(a) || 0) - (componentStart.get(b) || 0) || componentLine[a] - componentLine[b]);
            queue.push(...pending);
          }
        }
      }

      const rows = new Map();
      const rawLevels = nodes.map((node) => (componentStart.get(componentById.get(node.id)) || 0) + (memberLevels.get(node.id) || 0));
      const compactLevel = new Map(Array.from(new Set(rawLevels)).sort((a, b) => a - b).map((level, index) => [level, index]));
      for (const node of nodes) {
        const rawLevel = (componentStart.get(componentById.get(node.id)) || 0) + (memberLevels.get(node.id) || 0);
        const nodeLevel = compactLevel.get(rawLevel) || 0;
        if (!rows.has(nodeLevel)) rows.set(nodeLevel, []);
        rows.get(nodeLevel).push(node);
      }

      const orderedLevels = Array.from(rows.keys()).sort((a, b) => a - b);
      let maxColumns = 0;
      for (const lev of orderedLevels) {
        const rowNodes = rows.get(lev);
        rowNodes.sort((a, b) => a.line - b.line || a.title.localeCompare(b.title));
        maxColumns = Math.max(maxColumns, rowNodes.length);
      }

      const siblingGap = 40;
      const levelGap = X_GAP;
      const columnStep = NODE_W + siblingGap;
      const graphStackWidth = Math.max(1, maxColumns) * NODE_W + Math.max(0, maxColumns - 1) * siblingGap;
      const lastLevelIndex = Math.max(0, orderedLevels.length - 1);
      for (const lev of orderedLevels) {
        const rowNodes = rows.get(lev);
        const rowStackWidth = rowNodes.length * NODE_W + Math.max(0, rowNodes.length - 1) * siblingGap;
        const rowOffsetX = Math.max(0, (graphStackWidth - rowStackWidth) / 2);
        rowNodes.forEach((node, column) => {
          node.x = PAD + rowOffsetX + column * columnStep;
          node.y = PAD + (lastLevelIndex - lev) * (NODE_H + levelGap);
        });
      }

      const width = PAD * 2 + Math.max(1, maxColumns) * NODE_W + Math.max(0, maxColumns - 1) * siblingGap;
      const height = PAD * 2 + Math.max(1, orderedLevels.length) * NODE_H + Math.max(0, orderedLevels.length - 1) * levelGap;
      return { width, height };
    }

    function computeBlocked(nodes) {
      const byId = new Map(nodes.map((node) => [node.id, node]));
      nodes.forEach((node) => {
        node.blocked = false;
      });
      for (const node of nodes) {
        if (node.status !== "false") continue;
        const queue = node.dependents.slice();
        const seen = new Set();
        while (queue.length) {
          const id = queue.shift();
          if (seen.has(id)) continue;
          seen.add(id);
          const dependent = byId.get(id);
          if (!dependent) continue;
          dependent.blocked = true;
          queue.push(...dependent.dependents);
        }
      }
    }

    function statusCounts(nodes) {
      return nodes.reduce((acc, node) => {
        acc[node.status] = (acc[node.status] || 0) + 1;
        if (node.blocked && node.status !== "false") acc.blocked += 1;
        if (node.isLeaf) acc.leaf += 1;
        if (node.isFinal) acc.final += 1;
        return acc;
      }, { true: 0, false: 0, pending: 0, blocked: 0, leaf: 0, final: 0 });
    }

    function makeSvg(tag, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      for (const [key, value] of Object.entries(attrs)) {
        el.setAttribute(key, String(value));
      }
      return el;
    }

    function clear(el) {
      while (el.firstChild) el.removeChild(el.firstChild);
    }

    function measureNodeText(className, text) {
      if (!els.graphSvg) return NaN;
      if (!measureNodeText.group) {
        const group = makeSvg("g", {
          class: "node",
          opacity: "0",
          "aria-hidden": "true",
          transform: "translate(-10000 -10000)"
        });
        group.style.pointerEvents = "none";
        const measureText = makeSvg("text");
        group.appendChild(measureText);
        els.graphSvg.appendChild(group);
        measureNodeText.group = group;
        measureNodeText.text = measureText;
      } else if (!measureNodeText.group.parentNode) {
        els.graphSvg.appendChild(measureNodeText.group);
      }
      const measureText = measureNodeText.text;
      measureText.setAttribute("class", className);
      measureText.textContent = text;
      try {
        return measureText.getComputedTextLength();
      } catch {
        return NaN;
      }
    }

    function textFitsWidth(className, text, maxWidth, fallbackMaxChars) {
      const width = measureNodeText(className, text);
      if (Number.isFinite(width) && width > 0) return width <= maxWidth;
      return String(text || "").length <= fallbackMaxChars;
    }

    function ellipsizeTextToWidth(text, className, maxWidth, fallbackMaxChars) {
      const value = String(text || "").trim();
      if (!value || textFitsWidth(className, value, maxWidth, fallbackMaxChars)) return value;
      let lo = 0;
      let hi = value.length;
      while (lo < hi) {
        const mid = Math.ceil((lo + hi) / 2);
        if (textFitsWidth(className, value.slice(0, mid).trimEnd() + "…", maxWidth, fallbackMaxChars)) lo = mid;
        else hi = mid - 1;
      }
      return value.slice(0, lo).trimEnd() + "…";
    }

    function wrapText(text, className, maxWidth, maxLines, fallbackMaxChars) {
      const words = String(text || "").split(/\s+/).filter(Boolean);
      const lines = [];
      const remaining = words.slice();
      while (remaining.length && lines.length < maxLines) {
        let line = "";
        while (remaining.length) {
          const next = line ? line + " " + remaining[0] : remaining[0];
          if (!textFitsWidth(className, next, maxWidth, fallbackMaxChars)) break;
          line = next;
          remaining.shift();
        }
        if (!line) {
          line = ellipsizeTextToWidth(remaining.shift(), className, maxWidth, fallbackMaxChars);
        } else if (lines.length === maxLines - 1 && remaining.length) {
          line = ellipsizeTextToWidth([line, ...remaining].join(" "), className, maxWidth, fallbackMaxChars);
          remaining.length = 0;
        }
        lines.push(line);
      }
      return lines.length ? lines : [""];
    }

    function wrapIdText(text, maxChars, maxLines) {
      let remaining = String(text || "").trim().replace(/\s+/g, " ");
      if (!remaining) return [""];
      const lines = [];
      while (remaining && lines.length < maxLines) {
        const isLastLine = lines.length === maxLines - 1;
        if (remaining.length <= maxChars) {
          lines.push(remaining);
          break;
        }
        if (isLastLine) {
          lines.push(remaining.slice(0, Math.max(1, maxChars - 1)) + "…");
          break;
        }
        const breakAt = Math.max(
          remaining.lastIndexOf(":", maxChars - 1),
          remaining.lastIndexOf("-", maxChars - 1),
          remaining.lastIndexOf("_", maxChars - 1),
          remaining.lastIndexOf(" ", maxChars)
        );
        const lineEnd = breakAt > Math.floor(maxChars * 0.45) ? breakAt + 1 : maxChars;
        lines.push(remaining.slice(0, lineEnd).trimEnd());
        remaining = remaining.slice(lineEnd).trimStart();
      }
      return lines.length ? lines : [""];
    }

    function edgeKey(from, to) {
      return from + "\u0000" + to;
    }

    function edgePath(from, to, fromPortOffset = 0, toPortOffset = 0) {
      const x1 = from.x + NODE_W / 2 + fromPortOffset;
      const y1 = from.y;
      const x2 = to.x + NODE_W / 2 + toPortOffset;
      const y2 = to.y + NODE_H;
      const dy = Math.max(54, (y1 - y2) * 0.48);
      return "M " + x1 + " " + y1 + " C " + x1 + " " + (y1 - dy) + ", " + x2 + " " + (y2 + dy) + ", " + x2 + " " + y2;
    }

    function uniqueEdges(edges) {
      const seen = new Set();
      const result = [];
      for (const edge of Array.isArray(edges) ? edges : []) {
        if (!edge || edge.from == null || edge.to == null) continue;
        const from = String(edge.from);
        const to = String(edge.to);
        if (!from || !to) continue;
        const key = edgeKey(from, to);
        if (seen.has(key)) continue;
        seen.add(key);
        result.push({ ...edge, from, to });
      }
      return result;
    }

    function edgePortOffsets(count) {
      if (count <= 1) return [0];
      const usableWidth = Math.max(0, NODE_W - EDGE_PORT_MARGIN * 2);
      const step = Math.min(EDGE_PORT_STEP, usableWidth / (count - 1));
      const center = (count - 1) / 2;
      return Array.from({ length: count }, (_, index) => Math.round((index - center) * step));
    }

    function compareEdgePortOrder(a, b, direction) {
      const aNode = direction === "outgoing" ? a.to : a.from;
      const bNode = direction === "outgoing" ? b.to : b.from;
      return (
        (aNode.x + NODE_W / 2) - (bNode.x + NODE_W / 2) ||
        aNode.y - bNode.y ||
        a.key.localeCompare(b.key)
      );
    }

    function assignEdgePortOffsets(renderedEdges) {
      const outgoing = new Map();
      const incoming = new Map();
      for (const item of renderedEdges) {
        item.fromPortOffset = 0;
        item.toPortOffset = 0;
        if (!outgoing.has(item.from.id)) outgoing.set(item.from.id, []);
        if (!incoming.has(item.to.id)) incoming.set(item.to.id, []);
        outgoing.get(item.from.id).push(item);
        incoming.get(item.to.id).push(item);
      }

      for (const items of outgoing.values()) {
        items.sort((a, b) => compareEdgePortOrder(a, b, "outgoing"));
        const offsets = edgePortOffsets(items.length);
        items.forEach((item, index) => {
          item.fromPortOffset = offsets[index];
        });
      }

      for (const items of incoming.values()) {
        items.sort((a, b) => compareEdgePortOrder(a, b, "incoming"));
        const offsets = edgePortOffsets(items.length);
        items.forEach((item, index) => {
          item.toPortOffset = offsets[index];
        });
      }
    }

    function collectSelectionFocus(startId) {
      const byId = new Map(state.nodes.map((node) => [node.id, node]));
      const dependencies = new Set();
      const dependents = new Set();
      const dependencyEdges = new Set();
      const dependentEdges = new Set();
      const incoming = new Map();
      const outgoing = new Map();
      for (const node of state.nodes) {
        incoming.set(node.id, []);
        outgoing.set(node.id, []);
      }
      for (const edge of state.edges) {
        if (!byId.has(edge.from) || !byId.has(edge.to)) continue;
        incoming.get(edge.to).push(edge.from);
        outgoing.get(edge.from).push(edge.to);
      }

      const directDependencies = new Set((incoming.get(startId) || []).filter((id) => byId.has(id)));
      const directDependents = new Set((outgoing.get(startId) || []).filter((id) => byId.has(id)));
      const directDependencyEdges = new Set(Array.from(directDependencies).map((id) => edgeKey(id, startId)));
      const directDependentEdges = new Set(Array.from(directDependents).map((id) => edgeKey(startId, id)));

      const dependencyQueue = [startId];
      const dependencyVisited = new Set([startId]);
      while (dependencyQueue.length) {
        const id = dependencyQueue.shift();
        for (const depId of incoming.get(id) || []) {
          dependencyEdges.add(edgeKey(depId, id));
          if (dependencyVisited.has(depId)) continue;
          dependencyVisited.add(depId);
          if (depId !== startId) dependencies.add(depId);
          dependencyQueue.push(depId);
        }
      }

      const dependentQueue = [startId];
      const dependentVisited = new Set([startId]);
      while (dependentQueue.length) {
        const id = dependentQueue.shift();
        for (const dependentId of outgoing.get(id) || []) {
          dependentEdges.add(edgeKey(id, dependentId));
          if (dependentVisited.has(dependentId)) continue;
          dependentVisited.add(dependentId);
          if (dependentId !== startId) dependents.add(dependentId);
          dependentQueue.push(dependentId);
        }
      }

      const related = new Set([startId, ...dependencies, ...dependents]);
      return {
        selectedId: startId,
        dependencies,
        dependents,
        directDependencies,
        directDependents,
        dependencyEdges,
        dependentEdges,
        directDependencyEdges,
        directDependentEdges,
        related
      };
    }

    function selectionFocusSets() {
      if (!state.selectedId) return null;
      const selected = state.nodes.find((node) => node.id === state.selectedId);
      if (!selected) return null;
      return collectSelectionFocus(state.selectedId);
    }

    function classForNode(node, focus = null) {
      const classes = ["node", "status-" + node.status];
      if (node.isLeaf) classes.push("leaf");
      if (node.isFinal) classes.push("final");
      if (node.blocked) classes.push("blocked");
      if (node.id === state.selectedId) classes.push("selected");
      if (focus) {
        const dependency = focus.dependencies.has(node.id);
        const dependent = focus.dependents.has(node.id);
        const directDependency = focus.directDependencies.has(node.id);
        const directDependent = focus.directDependents.has(node.id);
        const direct = directDependency || directDependent;
        if (dependency || dependent) classes.push("relation", direct ? "direct" : "indirect");
        if (dependency) classes.push("dependency");
        if (dependent) classes.push("dependent");
        if (!focus.related.has(node.id)) classes.push("unrelated");
      }
      return classes.join(" ");
    }

    function isFalseSourceNode(from) {
      return from.status === "false";
    }

    function isFocusedEdge(edge, focus = null) {
      if (!focus) return true;
      const key = edgeKey(edge.from, edge.to);
      return focus.dependencyEdges.has(key) || focus.dependentEdges.has(key);
    }

    function isBlockingEdge(edge, from, focus = null) {
      return isFalseSourceNode(from) && isFocusedEdge(edge, focus);
    }

    function classForEdge(edge, from, to, focus = null) {
      const classes = ["edge"];
      if (isFalseSourceNode(from)) classes.push("false-source");
      const blockedEdge = isBlockingEdge(edge, from, focus);
      if (blockedEdge) classes.push("blocked");
      if (focus) {
        const key = edgeKey(edge.from, edge.to);
        const dependencyEdge = focus.dependencyEdges.has(key);
        const dependentEdge = focus.dependentEdges.has(key);
        const directEdge = focus.directDependencyEdges.has(key) || focus.directDependentEdges.has(key);
        if (dependencyEdge) classes.push("relation", "dependency", directEdge ? "direct" : "indirect");
        if (dependentEdge) classes.push("relation", "dependent", directEdge ? "direct" : "indirect");
        if (!dependencyEdge && !dependentEdge) classes.push("unrelated");
      }
      return classes.join(" ");
    }

    function classTokenSet(className) {
      return new Set(className.split(/\s+/).filter(Boolean));
    }

    function focusRenderRank(className) {
      const tokens = classTokenSet(className);
      if (tokens.has("selected")) return 3;
      if (tokens.has("direct")) return 2;
      if (tokens.has("indirect")) return 1;
      return 0;
    }

    function markerForEdgeClass(edgeClass, blockedEdge) {
      const tokens = classTokenSet(edgeClass);
      if (tokens.has("false-source")) return "url(#arrowFalse)";
      if (blockedEdge) return "url(#arrowBlocked)";
      if (!tokens.has("relation")) return "url(#arrow)";
      return tokens.has("direct") ? "url(#arrowRelation)" : "url(#arrow)";
    }

    function normalizeStatus(value) {
      return value === "true" || value === "false" ? value : "pending";
    }

    function statusSliderValue(status) {
      if (status === "true") return 0;
      if (status === "false") return 2;
      return 1;
    }

    function replaceStatusClass(element, status) {
      if (!element) return;
      element.classList.remove("status-pending", "status-false", "status-true");
      element.classList.add("status-" + status);
    }

    function applyRenderedNodeStatus(id, status) {
      const nodeEl = findRenderedNodeElement(id);
      if (!nodeEl) return;
      const node = state.nodes.find((item) => item.id === id);
      replaceStatusClass(nodeEl, status);
      nodeEl.classList.toggle("blocked", !!node?.blocked);
      const slider = nodeEl.querySelector(".status-slider");
      replaceStatusClass(slider, status);
      if (slider) {
        slider.setAttribute("aria-valuenow", String(statusSliderValue(status)));
        slider.setAttribute("aria-valuetext", status);
        slider.querySelector(".false-action")?.classList.toggle("active", status === "false");
        slider.querySelector(".true-action")?.classList.toggle("active", status === "true");
      }
      nodeEl.setAttribute("aria-label", (node?.title || id) + ", " + status);
    }

    function applyRenderedBlockedNodeStatuses() {
      const byId = new Map(state.nodes.map((node) => [node.id, node]));
      for (const nodeEl of els.nodesLayer.children) {
        const node = byId.get(nodeEl.dataset?.nodeId);
        if (!node) continue;
        nodeEl.classList.toggle("blocked", !!node.blocked);
      }
    }

    function applyRenderedEdgeStatuses() {
      const byId = new Map(state.nodes.map((node) => [node.id, node]));
      const focus = selectionFocusSets();
      els.edgesLayer.querySelectorAll(".edge").forEach((path) => {
        const edge = {
          from: path.dataset.edgeFrom,
          to: path.dataset.edgeTo
        };
        const from = byId.get(edge.from);
        const to = byId.get(edge.to);
        if (!from || !to) return;
        const edgeClass = classForEdge(edge, from, to, focus);
        const blockedEdge = isBlockingEdge(edge, from, focus);
        path.setAttribute("class", edgeClass);
        path.setAttribute("marker-end", markerForEdgeClass(edgeClass, blockedEdge));
      });
    }

    function scheduleStatusRender() {
      clearTimeout(state.statusRenderTimer);
      state.statusRenderTimer = setTimeout(() => {
        state.statusRenderTimer = 0;
        renderGraph();
      }, SMOOTH_SLIDE_DURATION_MS + 40);
    }

    function setNodeStatus(id, nextStatus, toggle = true, options = {}) {
      const node = state.nodes.find((item) => item.id === id);
      if (!node) return;
      const priorStatus = normalizeStatus(node.status);
      const normalized = normalizeStatus(nextStatus);
      const status = toggle && priorStatus === normalized ? "pending" : normalized;
      if (priorStatus === status) return;
      node.status = status;
      armGraphExitWarning();
      saveLocalStatuses();
      if (options.deferRender) {
        computeBlocked(state.nodes);
        applyRenderedNodeStatus(id, status);
        applyRenderedBlockedNodeStatuses();
        applyRenderedEdgeStatuses();
        renderStats();
        renderDetails();
        scheduleStatusRender();
        return;
      }
      clearTimeout(state.statusRenderTimer);
      state.statusRenderTimer = 0;
      renderGraph();
    }

    function statusFromSliderPointer(event, slider) {
      const hitbox = slider.querySelector(".slider-hitbox");
      const rect = (hitbox || slider).getBoundingClientRect();
      const x = rect.width ? (event.clientX - rect.left) / rect.width : 0.5;
      return x < 0.5 ? "true" : "false";
    }

    function updateStatusSliderHotspotState(event, slider, active = false) {
      const hotStatus = statusFromSliderPointer(event, slider);
      slider.querySelectorAll(".status-action").forEach((action) => {
        const hot = action.classList.contains(hotStatus + "-action");
        action.classList.toggle("hotspot-hover", hot);
        action.classList.toggle("hotspot-active", active && hot);
      });
    }

    function clearStatusSliderHotspotState(slider) {
      slider.querySelectorAll(".status-action").forEach((action) => {
        action.classList.remove("hotspot-hover", "hotspot-active");
      });
    }

    function stopStatusSliderEvent(event) {
      event.preventDefault();
      if (event.stopImmediatePropagation) event.stopImmediatePropagation();
      event.stopPropagation();
    }

    function fallbackCopyText(value) {
      const textarea = document.createElement("textarea");
      textarea.value = value;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      textarea.style.top = "0";
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      let copied = false;
      try {
        copied = document.execCommand("copy");
      } catch {
        copied = false;
      }
      textarea.remove();
      return copied;
    }

    async function copyText(value) {
      if (navigator.clipboard?.writeText) {
        try {
          await navigator.clipboard.writeText(value);
          return true;
        } catch {
          return fallbackCopyText(value);
        }
      }
      return fallbackCopyText(value);
    }

    function motionNow() {
      return performance?.now ? performance.now() : Date.now();
    }

    function clamp01(value) {
      return Math.max(0, Math.min(1, value));
    }

    function smoothstep(value) {
      const t = clamp01(value);
      return t * t * (3 - 2 * t);
    }

    function numberInRange(value, fallback, min, max) {
      if (value == null || value === "") return fallback;
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return fallback;
      return Math.max(min, Math.min(max, numeric));
    }

    function prefersReducedMotion() {
      try {
        return !!window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches;
      } catch {
        return false;
      }
    }

    function normalizeCopyJiggleParams(options = {}, base = COPY_JIGGLE_DEFAULTS) {
      return {
        yFreqHz: numberInRange(options.yFreqHz, base.yFreqHz, 0.1, 12),
        xFreqHz: numberInRange(options.xFreqHz, base.xFreqHz, 0.1, 12),
        yDamping: numberInRange(options.yDamping, base.yDamping, 0.001, 0.999),
        xDamping: numberInRange(options.xDamping, base.xDamping, 0.001, 0.999),
        yLagMs: numberInRange(options.yLagMs, base.yLagMs, 0, 160),
        attackMs: numberInRange(options.attackMs, base.attackMs, 0, 240),
        settleStart: numberInRange(options.settleStart, base.settleStart, 0, 0.99),
        sagGain: numberInRange(options.sagGain, base.sagGain, -1, 1),
        sagDecay: numberInRange(options.sagDecay, base.sagDecay, 0, 12),
        lateralCoupling: numberInRange(options.lateralCoupling, base.lateralCoupling, -1, 1),
        normalizePath: options.normalizePath == null ? base.normalizePath : options.normalizePath !== false
      };
    }

    function copyJiggleParamKey(p) {
      return [
        p.duration,
        p.yFreqHz,
        p.xFreqHz,
        p.yDamping,
        p.xDamping,
        p.yLagMs,
        p.attackMs,
        p.settleStart,
        p.sagGain,
        p.sagDecay,
        p.lateralCoupling,
        p.normalizePath ? 1 : 0
      ].join("|");
    }

    function dampedSpringImpulse(timeSec, freqHz, dampingRatio) {
      const zeta = numberInRange(dampingRatio, 0.5, 0.001, 0.999);
      const omega0 = 2 * Math.PI * freqHz;
      const omegaD = omega0 * Math.sqrt(1 - zeta * zeta);
      return Math.exp(-zeta * omega0 * timeSec) * Math.sin(omegaD * timeSec);
    }

    function copyJiggleUnit(t, p) {
      const durationSec = p.duration / 1000;
      const timeSec = t * durationSec;
      const attack = smoothstep(timeSec / Math.max(0.001, p.attackMs / 1000));
      const settle = 1 - smoothstep((t - p.settleStart) / Math.max(0.001, 1 - p.settleStart));
      const yTimeSec = Math.max(0, timeSec - p.yLagMs / 1000);
      const xBase = dampedSpringImpulse(timeSec, p.xFreqHz, p.xDamping);
      const yBase = dampedSpringImpulse(yTimeSec, p.yFreqHz, p.yDamping);
      const coupledX = (
        dampedSpringImpulse(yTimeSec, p.yFreqHz * 1.32, p.yDamping + 0.08)
        * p.lateralCoupling
      );
      const sag = (
        Math.sin(t * Math.PI)
        * Math.exp(-p.sagDecay * timeSec)
        * p.sagGain
      );
      return {
        x: (xBase + coupledX) * attack * settle,
        y: (yBase + sag) * attack * settle
      };
    }

    function getCopyJiggleNormalizer(p) {
      if (!p.normalizePath) return { x: 1, y: 1 };
      const key = copyJiggleParamKey(p);
      const cached = copyJiggleNormalizerCache.get(key);
      if (cached) return cached;
      let maxX = 0.0001;
      let maxY = 0.0001;
      const samples = 192;
      for (let i = 0; i <= samples; i += 1) {
        const point = copyJiggleUnit(i / samples, p);
        maxX = Math.max(maxX, Math.abs(point.x));
        maxY = Math.max(maxY, Math.abs(point.y));
      }
      const normalizer = Object.freeze({
        x: 1 / maxX,
        y: 1 / maxY
      });
      if (copyJiggleNormalizerCache.size > 32) copyJiggleNormalizerCache.clear();
      copyJiggleNormalizerCache.set(key, normalizer);
      return normalizer;
    }

    function copyJiggleActionOptions(options = {}) {
      return {
        duration: numberInRange(options.duration, COPY_JIGGLE_DEFAULTS.duration, 180, 1200),
        translateXPx: numberInRange(options.translateXPx, COPY_JIGGLE_DEFAULTS.translateXPx, 0, 48),
        translateYPx: numberInRange(options.translateYPx, COPY_JIGGLE_DEFAULTS.translateYPx, 0, 48),
        ...normalizeCopyJiggleParams(options)
      };
    }

    function copyJiggleMotionFields(options = {}, baseMotion = {}) {
      const translateXPx = numberInRange(options.translateXPx, 0, 0, 48);
      const translateYPx = numberInRange(options.translateYPx, 0, 0, 48);
      if (!translateXPx && !translateYPx) {
        return { translateXPx, translateYPx };
      }
      const params = normalizeCopyJiggleParams(options);
      return {
        ...params,
        translateXPx,
        translateYPx,
        copyJiggleNormalizer: getCopyJiggleNormalizer({
          ...baseMotion,
          ...params,
          translateXPx,
          translateYPx
        })
      };
    }

    function motionProgress(motion, cutoff) {
      const elapsed = cutoff - motion.startedAt - motion.delay;
      if (elapsed < 0) return { waiting: true, done: false, t: 0 };
      const raw = elapsed / motion.duration;
      return { waiting: false, done: raw >= 1, t: clamp01(raw) };
    }

    function screenPxToWorldValue(value) {
      const safeZoom = Number.isFinite(state.zoom) && state.zoom > 0 ? state.zoom : 1;
      return value / safeZoom;
    }

    function findRenderedNodeElement(id) {
      for (const nodeEl of els.nodesLayer.children) {
        if (nodeEl.dataset?.nodeId === id) return nodeEl;
      }
      return null;
    }

    function copyJiggleTransformForMotion(motion, t) {
      const point = copyJiggleUnit(t, motion);
      const normalizer = motion.copyJiggleNormalizer || getCopyJiggleNormalizer(motion);
      return {
        translateX: motion.translateXPx
          ? screenPxToWorldValue(point.x * normalizer.x * motion.translateXPx)
          : 0,
        translateY: motion.translateYPx
          ? screenPxToWorldValue(point.y * normalizer.y * motion.translateYPx)
          : 0
      };
    }

    function setNodeTransform(node, translateX = 0, translateY = 0) {
      const nodeEl = findRenderedNodeElement(node.id);
      if (!nodeEl) return;
      nodeEl.setAttribute("transform", "translate(" + (node.x + translateX) + " " + (node.y + translateY) + ")");
    }

    function applyCopyJiggleFrame() {
      state.copyJiggleRaf = 0;
      if (!state.copyJiggleMotions.size || prefersReducedMotion()) {
        state.copyJiggleMotions.clear();
        return;
      }
      const cutoff = motionNow();
      for (const [id, motion] of state.copyJiggleMotions) {
        const node = state.nodes.find((item) => item.id === id);
        if (!node) {
          state.copyJiggleMotions.delete(id);
          continue;
        }
        const progress = motionProgress(motion, cutoff);
        if (progress.done) {
          state.copyJiggleMotions.delete(id);
          setNodeTransform(node);
          continue;
        }
        if (progress.waiting) {
          setNodeTransform(node);
          continue;
        }
        const transform = copyJiggleTransformForMotion(motion, progress.t);
        setNodeTransform(node, transform.translateX, transform.translateY);
      }
      if (state.copyJiggleMotions.size) {
        state.copyJiggleRaf = requestAnimationFrame(applyCopyJiggleFrame);
      }
    }

    function requestCopyJiggleFrame() {
      if (state.copyJiggleRaf || prefersReducedMotion()) return;
      state.copyJiggleRaf = requestAnimationFrame(applyCopyJiggleFrame);
    }

    function startNodeCopyJiggle(node) {
      if (!node?.id || prefersReducedMotion()) return;
      const options = copyJiggleActionOptions({ action: "copy-text-object" });
      const baseMotion = {
        phase: "pulse",
        startedAt: motionNow(),
        delay: 0,
        duration: options.duration
      };
      state.copyJiggleMotions.set(node.id, {
        ...baseMotion,
        ...copyJiggleMotionFields(options, baseMotion)
      });
      requestCopyJiggleFrame();
    }

    function copyNodeTitle(node) {
      copyText(node.title).then((copied) => {
        if (copied) startNodeCopyJiggle(node);
      });
    }

    function hasEditableCopyTarget() {
      const target = document.activeElement;
      if (!target) return false;
      if (target.isContentEditable) return true;
      return ["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName);
    }

    function handleNodeCopyShortcut(event) {
      if (!(event.metaKey || event.ctrlKey) || event.altKey || event.shiftKey) return;
      if (String(event.key || "").toLowerCase() !== "c") return;
      if (hasEditableCopyTarget()) return;
      const selection = window.getSelection?.();
      if (selection && !selection.isCollapsed && String(selection).trim()) return;
      const node = state.nodes.find((item) => item.id === state.selectedId);
      if (!node) return;
      event.preventDefault();
      copyNodeTitle(node);
    }

    function handleSaveShortcut(event) {
      if (!(event.metaKey || event.ctrlKey) || event.altKey) return;
      if (String(event.key || "").toLowerCase() !== "s") return;
      event.preventDefault();
      event.stopPropagation();
      closeContextMenu();
      if (event.shiftKey) saveAsHtml();
      else exportHtml();
    }

    function attachStatusSliderEvents(slider, node) {
      let activePointer = null;
      let suppressClick = false;

      function releasePointer(event) {
        slider.classList.remove("pressed");
        if (activePointer !== null && slider.releasePointerCapture) {
          try {
            slider.releasePointerCapture(activePointer);
          } catch {
            // Pointer capture may already be released if the SVG was re-rendered.
          }
        }
        activePointer = null;
        clearStatusSliderHotspotState(slider);
        event.preventDefault();
        event.stopPropagation();
      }

      slider.addEventListener("pointermove", (event) => {
        updateStatusSliderHotspotState(event, slider, activePointer !== null);
      });

      slider.addEventListener("pointerleave", () => {
        if (activePointer === null) clearStatusSliderHotspotState(slider);
      });

      slider.addEventListener("pointerdown", (event) => {
        if (event.button !== undefined && event.button !== 0) return;
        event.preventDefault();
        event.stopPropagation();
        activePointer = event.pointerId;
        slider.classList.add("pressed");
        updateStatusSliderHotspotState(event, slider, true);
        if (slider.setPointerCapture) {
          try {
            slider.setPointerCapture(event.pointerId);
          } catch {
            // Some embedded SVG contexts do not support pointer capture.
          }
        }
      });

      slider.addEventListener("pointerup", (event) => {
        if (activePointer === null) return;
        const status = statusFromSliderPointer(event, slider);
        releasePointer(event);
        suppressClick = true;
        state.statusClickSuppress = {
          id: node.id,
          until: Date.now() + 260
        };
        setTimeout(() => {
          suppressClick = false;
        }, 0);
        setNodeStatus(node.id, status, true, { deferRender: true });
      });

      slider.addEventListener("pointercancel", releasePointer);
      slider.addEventListener("mousedown", stopStatusSliderEvent);
      slider.addEventListener("mouseup", stopStatusSliderEvent);
      slider.addEventListener("click", (event) => {
        stopStatusSliderEvent(event);
        const suppressed = state.statusClickSuppress;
        if (suppressed && suppressed.id === node.id && Date.now() <= suppressed.until) {
          state.statusClickSuppress = null;
          return;
        }
        if (suppressClick) {
          suppressClick = false;
          return;
        }
        state.statusClickSuppress = null;
        const status = statusFromSliderPointer(event, slider);
        setNodeStatus(node.id, status, true, { deferRender: true });
      });
      slider.addEventListener("dblclick", stopStatusSliderEvent);
      slider.addEventListener("contextmenu", stopStatusSliderEvent);

      slider.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") {
          stopStatusSliderEvent(event);
          setNodeStatus(node.id, "true", true);
        } else if (event.key === "ArrowRight") {
          stopStatusSliderEvent(event);
          setNodeStatus(node.id, "false", true);
        } else if (event.key === "Home") {
          stopStatusSliderEvent(event);
          setNodeStatus(node.id, "true", false);
        } else if (event.key === "End") {
          stopStatusSliderEvent(event);
          setNodeStatus(node.id, "false", false);
        } else if (event.key === "Escape") {
          stopStatusSliderEvent(event);
          setNodeStatus(node.id, "pending", false);
        } else if (event.key === "Enter" || event.key === " ") {
          stopStatusSliderEvent(event);
          setNodeStatus(node.id, node.status === "true" ? "false" : "true", false);
        }
      });
    }

    function makeStatusSlider(node) {
      const slider = STATUS_SLIDER;
      const status = normalizeStatus(node.status);
      const group = makeSvg("g", {
        class: "status-slider status-" + status,
        transform: "translate(" + slider.x + " " + slider.y + ")",
        tabindex: "0",
        role: "slider",
        "aria-label": node.title + " status",
        "aria-valuemin": "0",
        "aria-valuemax": "2",
        "aria-valuenow": String(statusSliderValue(status)),
        "aria-valuetext": status
      });

      group.appendChild(makeSvg("rect", {
        class: "slider-hitbox",
        x: 0,
        y: 0,
        width: slider.width,
        height: slider.height,
        rx: slider.rx,
        ry: slider.rx
      }));

      group.appendChild(makeSvg("rect", {
        class: "status-shell",
        x: 0,
        y: 0,
        width: slider.width,
        height: slider.height,
        rx: slider.rx,
        ry: slider.rx
      }));

      const trueAction = makeSvg("g", { class: "status-action true-action" + (status === "true" ? " active" : "") });
      trueAction.appendChild(makeSvg("rect", {
        class: "status-action-bg",
        x: slider.contentX,
        y: slider.contentY,
        width: slider.itemSize,
        height: slider.itemSize,
        rx: Math.min(UI_RADIUS, slider.itemSize / 2),
        ry: Math.min(UI_RADIUS, slider.itemSize / 2)
      }));
      const trueLabel = makeSvg("text", { class: "status-label true-label", x: slider.leftX, y: slider.cy });
      trueLabel.textContent = "T";
      trueAction.appendChild(trueLabel);
      group.appendChild(trueAction);

      const separatorX = slider.contentX + slider.itemSize + slider.separatorGap + slider.separatorWidth / 2;
      group.appendChild(makeSvg("line", {
        class: "status-separator",
        x1: separatorX,
        y1: slider.contentY,
        x2: separatorX,
        y2: slider.contentY + slider.itemSize
      }));

      const falseAction = makeSvg("g", { class: "status-action false-action" + (status === "false" ? " active" : "") });
      falseAction.appendChild(makeSvg("rect", {
        class: "status-action-bg",
        x: slider.contentX + slider.itemSize + slider.separatorGap * 2 + slider.separatorWidth,
        y: slider.contentY,
        width: slider.itemSize,
        height: slider.itemSize,
        rx: Math.min(UI_RADIUS, slider.itemSize / 2),
        ry: Math.min(UI_RADIUS, slider.itemSize / 2)
      }));
      const falseLabel = makeSvg("text", { class: "status-label false-label", x: slider.rightX, y: slider.cy });
      falseLabel.textContent = "F";
      falseAction.appendChild(falseLabel);
      group.appendChild(falseAction);

      attachStatusSliderEvents(group, node);
      return group;
    }

    function renderStats() {
      const counts = statusCounts(state.nodes);
      const items = [
        ["Nodes", state.nodes.length],
        ["Edges", state.edges.length],
        ["False", counts.false],
        ["Blocked", counts.blocked]
      ];
      clear(els.stats);
      for (const [label, value] of items) {
        const div = document.createElement("div");
        div.className = "stat";
        const b = document.createElement("b");
        b.textContent = String(value);
        const span = document.createElement("span");
        span.textContent = label;
        div.append(b, span);
        els.stats.appendChild(div);
      }
    }

    function renderSummary() {
      if (!state.nodes.length) {
        els.graphSummary.textContent = "No graph loaded";
        return;
      }
      const counts = statusCounts(state.nodes);
      const duplicatePart = state.duplicateLabels.length ? " · " + state.duplicateLabels.length + " duplicate labels" : "";
      const unresolvedPart = state.unresolvedRefs.length ? " · " + state.unresolvedRefs.length + " unresolved reference labels" : "";
      els.graphSummary.textContent = state.nodes.length + " nodes · " + state.edges.length + " dependencies · " + counts.final + " final nodes" + duplicatePart + unresolvedPart;
    }

    function renderDetails() {
      clear(els.details);
      const node = state.nodes.find((item) => item.id === state.selectedId);
      if (!node) {
        const h = document.createElement("h2");
