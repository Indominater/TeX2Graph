<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Proogh</title>
  <style>
    :root {
      color-scheme: dark;
      --canvas-bg: #1c1b22;
      --canvas-bg-dark: #1c1b22;
      --canvas-text: #fbfbfe;
      --bg: var(--canvas-bg);
      --panel: #42414d;
      --ink: #fbfbfe;
      --muted: rgba(251, 251, 254, 0.68);
      --line: #777681;
      --line-strong: rgba(251, 251, 254, 0.74);
      --accent: rgba(10, 132, 255, 1);
      --accent-soft: rgba(10, 132, 255, 0.18);
      --warn: #ffb020;
      --warn-soft: rgba(255, 176, 32, 0.18);
      --true: #30d158;
      --true-soft: rgba(48, 209, 88, 0.16);
      --false: #ff453a;
      --false-soft: rgba(255, 69, 58, 0.18);
      --blocked: #9ca3af;
      --blocked-soft: #2f3038;
      --blocked-hatch: #55545f;
      --blocked-text: rgba(251, 251, 254, 0.72);
      --pending: #6b7280;
      --pending-soft: rgba(251, 251, 254, 0.12);
      --shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
      --radius: 25px;
      --text-font-family: 'Geist Sans', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --text-font-style: normal;
      --text-font-kerning: none;
      --text-font-stretch: normal;
      --text-font-variant-caps: normal;
      --text-letter-spacing: 0px;
      --text-direction: ltr;
      --regular_text: 400;
      --bold_text: 500;
      --black_font: #15141A;
      --white_font: #fbfbfe;
      --white_font_rgb: 251, 251, 254;
      --firefox-menu-bg: #42414d;
      --firefox-menu-border: #777681;
      --firefox-menu-text: var(--white_font);
      --menu_hover_bg: #5e5d69;
      --menu_pressed_bg: #7b7a84;
      --firefox-menu-hover-bg: var(--menu_hover_bg);
      --firefox-menu-active-bg: var(--menu_pressed_bg);
      --firefox-menu-separator: var(--menu_hover_bg);
      --firefox-menu-shadow:
        0 8px 24px rgba(0, 0, 0, 0.32),
        0 0 0 1px rgba(0, 0, 0, 0.10);
      --ui-radius: 25px;
      --menu-shell-radius: var(--ui-radius);
      --menu-shell-padding: 8px;
      --menu-item-height: 32px;
      --menu-item-padding: 0 8px;
      --menu-item-radius: var(--ui-radius);
      --menu-item-font-size: 13px;
      --menu-item-letter-spacing: var(--text-letter-spacing);
      --menu-item-line-height: 32px;
      --context-menu-width: 224px;
      --smooth-slide-duration: 220ms;
      --smooth-slide-ease: cubic-bezier(0.18, 0.9, 0.24, 1.18);
      --highlight-nudge-x: 2px;
      --selection-outline: rgba(10, 132, 255, 1);
      --selection-highlight: rgba(10, 132, 255, 0.3);
      --danger-text: #ff453a;
      --danger-bg: rgba(255, 69, 58, 0.18);
      --danger-hover-bg: rgba(255, 69, 58, 0.26);
      --danger-active-bg: rgba(255, 69, 58, 0.34);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      min-height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font: var(--text-font-style) var(--regular_text) var(--menu-item-font-size) var(--text-font-family);
      font-kerning: var(--text-font-kerning);
      font-stretch: var(--text-font-stretch);
      font-variant-caps: var(--text-font-variant-caps);
      letter-spacing: var(--text-letter-spacing);
      direction: var(--text-direction);
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app,
    .app * {
      cursor: default;
    }

    button,
    input,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 0;
      border-radius: var(--ui-radius);
      background: transparent;
      color: inherit;
      min-height: var(--menu-item-height);
      padding: var(--menu-item-padding);
      cursor: default;
      outline: none;
    }

    button:hover {
      background: var(--firefox-menu-hover-bg);
    }

    button.primary {
      background: var(--firefox-menu-hover-bg);
      color: var(--firefox-menu-text);
    }

    button.primary:hover {
      background: var(--firefox-menu-active-bg);
    }

    button.icon {
      width: 34px;
      padding: 0;
      display: inline-grid;
      place-items: center;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
    }

    .topbar {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      padding: 0;
      border: 0;
      opacity: 0;
      pointer-events: none;
    }

    .brand {
      font-weight: 740;
      font-size: 17px;
      white-space: nowrap;
      color: #111827;
    }

    .toolbar {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .toolbar input[type="search"],
    .toolbar input[type="text"] {
      min-width: 190px;
      width: min(260px, 24vw);
      border: 1px solid var(--line);
      border-radius: var(--ui-radius);
      height: 34px;
      padding: 0 8px;
      background: rgba(var(--white_font_rgb), 0.08);
      color: var(--ink);
      outline: none;
    }

    .toolbar input[type="search"]:focus,
    .toolbar input[type="text"]:focus,
    textarea:focus {
      border-color: var(--selection-outline);
      box-shadow: 0 0 0 2px var(--selection-highlight);
    }

    .workspace {
      position: relative;
      display: block;
      min-height: 0;
      overflow: hidden;
      background: var(--canvas-bg);
    }

    .sidebar {
      position: absolute;
      left: 12px;
      top: 12px;
      bottom: 12px;
      z-index: 4;
      width: min(390px, calc(100vw - 24px));
      min-height: 0;
      display: none;
      grid-template-rows: auto minmax(210px, 0.52fr) auto minmax(180px, 0.48fr);
      background: var(--firefox-menu-bg);
      border: 1px solid var(--firefox-menu-border);
      border-radius: var(--menu-shell-radius);
      box-shadow: var(--firefox-menu-shadow);
      color: var(--firefox-menu-text);
      padding: var(--menu-shell-padding);
      overflow: hidden;
      isolation: isolate;
      -webkit-mask-image: -webkit-radial-gradient(white, black);
      mask-image: radial-gradient(white, black);
    }

    .section-head {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: var(--menu-item-padding);
      border-bottom: 1px solid var(--firefox-menu-separator);
      color: var(--muted);
      font-size: var(--menu-item-font-size);
      font-weight: var(--bold_text);
      text-transform: uppercase;
      line-height: var(--menu-item-line-height);
    }

    .source-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-transform: none;
      font-weight: var(--regular_text);
      color: rgba(var(--white_font_rgb), 0.72);
    }

    textarea {
      resize: none;
      width: 100%;
      height: 100%;
      border: 0;
      border-bottom: 1px solid var(--firefox-menu-separator);
      padding: 10px 8px;
      outline: none;
      color: var(--firefox-menu-text);
      background: transparent;
      font: 12.5px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      letter-spacing: 0;
      user-select: text;
      -webkit-user-select: text;
      scrollbar-color: var(--firefox-menu-border) transparent;
    }

    textarea::placeholder {
      color: rgba(var(--white_font_rgb), 0.46);
    }

    .settings {
      padding: 8px 0;
      border-bottom: 1px solid var(--firefox-menu-separator);
      display: grid;
      gap: 10px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0;
      padding: 0 8px;
    }

    .stat {
      border: 0;
      border-radius: var(--ui-radius);
      padding: 7px 8px;
      background: transparent;
      min-width: 0;
      transition:
        background-color var(--smooth-slide-duration) var(--smooth-slide-ease),
        transform var(--smooth-slide-duration) var(--smooth-slide-ease);
    }

    .stat:hover {
      background: var(--firefox-menu-hover-bg);
      transform: translateX(var(--highlight-nudge-x));
    }

    .stat b {
      display: block;
      color: var(--firefox-menu-text);
      font-size: 16px;
      font-weight: var(--bold_text);
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: rgba(var(--white_font_rgb), 0.76);
      font-size: 12px;
      align-items: center;
      padding: 0 8px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: var(--ui-radius);
      border: 1px solid var(--line-strong);
      background: rgba(var(--white_font_rgb), 0.08);
      flex: 0 0 auto;
    }

    .swatch.final {
      border: 3px double var(--warn);
      background: var(--warn-soft);
    }

    .swatch.false {
      border-color: var(--false);
      background: var(--false-soft);
    }

    .swatch.blocked {
      border-color: var(--blocked);
      background:
        repeating-linear-gradient(
          -45deg,
          var(--blocked-soft) 0 5px,
          var(--blocked-hatch) 5px 8px
        );
      box-shadow: inset 0 0 0 2px rgba(100, 116, 139, 0.18);
    }

    .details {
      min-height: 0;
      overflow: auto;
      padding: 10px 8px;
      background: transparent;
      scrollbar-color: var(--firefox-menu-border) transparent;
    }

    .details h2 {
      margin: 0 0 4px;
      color: var(--firefox-menu-text);
      font-size: 15px;
      font-weight: var(--bold_text);
      line-height: 1.25;
      letter-spacing: 0;
    }

    .details .meta {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
      margin-bottom: 10px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 9px 0 12px;
    }

    .pill {
      border: 1px solid rgba(var(--white_font_rgb), 0.18);
      border-radius: var(--ui-radius);
      padding: 4px 9px;
      font-size: 12px;
      color: rgba(var(--white_font_rgb), 0.82);
      background: transparent;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .pill.status-true {
      border-color: rgba(22, 128, 74, 0.28);
      background: var(--true-soft);
      color: var(--true);
    }

    .pill.status-false {
      border-color: rgba(255, 69, 58, 0.42);
      background: var(--danger-bg);
      color: var(--danger-text);
    }

    .pill.status-pending {
      border-color: rgba(var(--white_font_rgb), 0.18);
      background: var(--pending-soft);
      color: rgba(var(--white_font_rgb), 0.78);
    }

    .pill.status-blocked {
      border-color: rgba(156, 163, 175, 0.55);
      background:
        repeating-linear-gradient(
          -45deg,
          var(--blocked-soft) 0 6px,
          var(--blocked-hatch) 6px 9px
        );
      color: var(--blocked-text);
    }

    .link-list {
      display: grid;
      gap: 5px;
      margin: 8px 0 14px;
    }

    .link-list button {
      min-height: 30px;
      height: auto;
      padding: var(--menu-item-padding);
      text-align: left;
      display: block;
      overflow-wrap: anywhere;
      color: var(--firefox-menu-text);
      background: transparent;
      transition:
        background-color var(--smooth-slide-duration) var(--smooth-slide-ease),
        transform var(--smooth-slide-duration) var(--smooth-slide-ease);
    }

    .link-list button:hover {
      background: var(--firefox-menu-hover-bg);
      transform: translateX(var(--highlight-nudge-x));
    }

    .snippet {
      border: 1px solid rgba(var(--white_font_rgb), 0.14);
      border-radius: 16px;
      background: rgba(var(--white_font_rgb), 0.06);
      color: rgba(var(--white_font_rgb), 0.78);
      padding: 9px;
      max-height: 180px;
      overflow: auto;
      white-space: pre-wrap;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      user-select: text;
      -webkit-user-select: text;
    }

    .graph-pane {
      position: absolute;
      inset: 0;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      background: var(--canvas-bg);
    }

    .graph-statusbar {
      min-height: 42px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--firefox-menu-separator);
      background: var(--firefox-menu-bg);
      z-index: 2;
    }

    .graph-statusbar .summary {
      color: var(--muted);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      flex: 0 0 auto;
    }

    .zoom-controls input {
      accent-color: var(--accent);
      width: 120px;
    }

    .graph-scroll {
      min-height: 0;
      overflow: hidden;
      position: relative;
      cursor: default;
      touch-action: none;
      user-select: none;
      background: var(--canvas-bg);
    }

    .graph-scroll.space-pan,
    .graph-scroll.panning {
      cursor: default;
    }

    #graphSvg {
      display: block;
      min-width: 100%;
      min-height: 100%;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      pointer-events: none;
      text-align: center;
      padding: 24px;
    }

    .empty-state strong {
      display: block;
      color: var(--firefox-menu-text);
      font-size: 18px;
      margin-bottom: 5px;
    }

    .edge {
      fill: none;
      stroke: rgba(251, 251, 254, 0.28);
      stroke-width: 1;
      opacity: 0.82;
      vector-effect: non-scaling-stroke;
    }

    .edge.dim {
      opacity: 0.14;
    }

    .edge.relation {
      stroke: var(--selection-outline);
      stroke-width: 1;
      opacity: 1;
    }

    .edge.relation.direct {
      stroke: var(--selection-outline);
      stroke-width: 1.65;
      stroke-dasharray: none;
      opacity: 0.98;
    }

    .edge.relation.indirect {
      stroke: rgba(10, 132, 255, 0.46);
      stroke-width: 0.9;
      stroke-dasharray: 4 8;
      opacity: 0.68;
    }

    .edge.dependency {
      stroke-dasharray: none;
    }

    .edge.dependent {
      stroke-dasharray: none;
    }

    .edge.blocked {
      stroke: var(--blocked);
      stroke-width: 1;
      stroke-dasharray: none;
      opacity: 0.78;
    }

    .edge.blocked.relation {
      stroke: var(--blocked);
      opacity: 1;
    }

    .node {
      cursor: default;
    }

    .node:focus {
      outline: none;
    }

    .node.unrelated {
      opacity: 0.16;
    }

    .node.search-dim {
      opacity: 0.18;
    }

    .node.relation.direct {
      opacity: 1;
    }

    .node.relation.indirect {
      opacity: 1;
    }

    .node.relation .body {
      stroke-width: 1;
    }

    .node.relation.direct .body {
      stroke-width: 1;
      stroke-dasharray: none;
    }

    .node.relation.indirect .body {
      stroke-width: 1;
      stroke-dasharray: none;
    }

    .node.relation.direct .selection-frame {
      opacity: 1;
      stroke: var(--selection-outline);
      stroke-width: 1;
      stroke-dasharray: 7 5;
    }

    .node.relation.indirect .selection-frame {
      opacity: 0;
      stroke-dasharray: none;
    }

    .node.dependency .body {
      stroke-dasharray: none;
    }

    .node.dependent .body {
      stroke-dasharray: none;
    }

    .node .body {
      fill: var(--firefox-menu-bg);
      stroke: var(--firefox-menu-border);
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
    }

    .node .selection-frame {
      fill: none;
      stroke: var(--selection-outline);
      stroke-width: 1;
      opacity: 0;
      pointer-events: none;
      vector-effect: non-scaling-stroke;
    }

    .node:hover .selection-frame,
    .node:focus-visible .selection-frame,
    .node.selected .selection-frame {
      opacity: 1;
    }

    .node.status-true .body {
      fill: rgba(48, 209, 88, 0.10);
      stroke: rgba(48, 209, 88, 0.72);
    }

    .node.status-false .body {
      fill: var(--false-soft);
      stroke: var(--false);
      stroke-width: 1;
    }

    .node.status-pending .body {
      fill: var(--firefox-menu-bg);
      stroke: var(--firefox-menu-border);
    }

    .node.blocked:not(.status-false) .body {
      fill: url(#blockedHatch);
      stroke: var(--blocked);
      stroke-width: 1;
      stroke-dasharray: none;
    }

    .node.final .body {
      stroke-width: 1;
    }

    .node.selected {
      opacity: 1;
      filter: none;
    }

    .node.selected.relation.direct .body,
    .node.selected.relation.indirect .body,
    .node.selected.blocked:not(.status-false) .body,
    .node.selected .body {
      stroke-width: 1;
      stroke-dasharray: none;
    }

    .node.selected.relation.direct .selection-frame,
    .node.selected.relation.indirect .selection-frame,
    .node.selected .selection-frame {
      opacity: 1;
      stroke: var(--selection-outline);
      stroke-width: 1;
      stroke-dasharray: none;
    }

    .node .title {
      font-weight: var(--bold_text);
      fill: var(--firefox-menu-text);
      font-size: 13px;
    }

    .node .id {
      fill: rgba(var(--white_font_rgb), 0.68);
      font-size: 10.5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .node .type {
      fill: rgba(var(--white_font_rgb), 0.78);
      font-size: 10.5px;
      font-weight: var(--bold_text);
      text-transform: uppercase;
    }

    .node .final-mark {
      fill: var(--warn);
    }

    .node .count {
      fill: rgba(var(--white_font_rgb), 0.68);
      font-size: 10.5px;
    }

    .status-slider {
      cursor: default;
      pointer-events: all;
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 170ms cubic-bezier(0.2, 1.35, 0.3, 1);
    }

    .status-slider.pressed {
      transform: scale(0.98);
    }

    .status-slider * {
      pointer-events: none;
    }

    .status-slider .slider-track {
      fill: rgba(var(--white_font_rgb), 0.10);
      stroke: rgba(var(--white_font_rgb), 0.26);
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
    }

    .status-slider .slider-knob {
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.24));
    }

    .status-slider .slider-label {
      fill: rgba(var(--white_font_rgb), 0.62);
      font-size: 12px;
      font-weight: var(--bold_text);
      text-anchor: middle;
      dominant-baseline: central;
    }

    .status-slider .slider-dot {
      fill: rgba(var(--white_font_rgb), 0.62);
    }

    .status-slider.status-false .slider-track {
      fill: rgba(255, 69, 58, 0.12);
      stroke: rgba(255, 69, 58, 0.42);
    }

    .status-slider.status-false .slider-knob {
      fill: var(--false);
    }

    .status-slider.status-false .slider-label.false-label,
    .status-slider.status-true .slider-label.true-label {
      fill: var(--white_font);
    }

    .status-slider.status-true .slider-track {
      fill: rgba(48, 209, 88, 0.12);
      stroke: rgba(48, 209, 88, 0.42);
    }

    .status-slider.status-true .slider-knob {
      fill: var(--true);
    }

    .status-slider.status-pending .slider-knob {
      fill: rgba(var(--white_font_rgb), 0.24);
    }

    .node.blocked:not(.status-false) .title,
    .node.blocked:not(.status-false) .id,
    .node.blocked:not(.status-false) .type,
    .node.blocked:not(.status-false) .count {
      fill: var(--blocked-text);
    }

    .node.blocked:not(.status-false) .final-mark {
      fill: var(--blocked);
    }

    .menu {
      position: fixed;
      z-index: 99999;
      display: none;
      width: auto;
      max-width: calc(100vw - 24px);
      background: var(--firefox-menu-bg);
      border: 1px solid var(--firefox-menu-border);
      border-radius: var(--menu-shell-radius);
      box-shadow: var(--firefox-menu-shadow);
      color: var(--firefox-menu-text);
      padding: var(--menu-shell-padding);
      overflow-x: auto;
      overflow-y: hidden;
      user-select: none;
      -webkit-user-select: none;
      isolation: isolate;
      transform: translateZ(0);
      -webkit-mask-image: -webkit-radial-gradient(white, black);
      mask-image: radial-gradient(white, black);
    }

    .menu.visible {
      display: inline-flex;
    }

    #appActionGroup {
      display: flex;
      align-items: center;
      gap: 0;
      white-space: nowrap;
    }

    .menu *,
    .menu *::before,
    .menu *::after {
      user-select: none;
      -webkit-user-select: none;
    }

    .ctx-item {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: auto;
      height: var(--menu-item-height);
      min-height: var(--menu-item-height);
      padding: 0 8px;
      font: var(--text-font-style) var(--bold_text) var(--menu-item-font-size) var(--text-font-family);
      line-height: var(--menu-item-line-height);
      color: var(--firefox-menu-text);
      background: transparent;
      border: 0;
      border-radius: var(--menu-item-radius);
      text-align: left;
      cursor: default;
      letter-spacing: var(--menu-item-letter-spacing);
      box-shadow: none;
      transition:
        background-color var(--smooth-slide-duration) var(--smooth-slide-ease),
        color var(--smooth-slide-duration) var(--smooth-slide-ease),
        opacity var(--smooth-slide-duration) var(--smooth-slide-ease);
    }

    .ctx-item:hover,
    .ctx-item:focus-visible {
      background: var(--firefox-menu-hover-bg);
      color: var(--firefox-menu-text);
      box-shadow: none;
      outline: none;
    }

    .ctx-item:active {
      background: var(--firefox-menu-active-bg);
      transition-duration: 0ms;
    }

    .ctx-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ctx-shortcut {
      color: rgba(var(--white_font_rgb), 0.7);
      font: var(--text-font-style) var(--regular_text) var(--menu-item-font-size) var(--text-font-family);
      line-height: inherit;
      justify-self: end;
      white-space: nowrap;
    }

    .ctx-sep {
      width: 1px;
      height: 22px;
      flex: 0 0 auto;
      background: var(--firefox-menu-separator);
      margin: 0 6px;
      pointer-events: none;
    }

    .ctx-search {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      padding: 0 8px;
      color: var(--firefox-menu-text);
      font: var(--text-font-style) var(--bold_text) var(--menu-item-font-size) var(--text-font-family);
      line-height: var(--menu-item-line-height);
      letter-spacing: var(--menu-item-letter-spacing);
    }

    .ctx-search input {
      width: clamp(96px, 16vw, 160px);
      height: 30px;
      border: 1px solid rgba(var(--white_font_rgb), 0.22);
      border-radius: var(--menu-item-radius);
      background: rgba(var(--white_font_rgb), 0.10);
      color: var(--firefox-menu-text);
      padding: 0 10px;
      outline: none;
      user-select: text;
      -webkit-user-select: text;
    }

    .ctx-search input::placeholder {
      color: rgba(var(--white_font_rgb), 0.58);
    }

    .ctx-search input:focus {
      border-color: rgba(var(--white_font_rgb), 0.45);
      box-shadow: 0 0 0 2px rgba(var(--white_font_rgb), 0.12);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 5%;
      transform: translateX(-50%);
      background: var(--firefox-menu-bg);
      color: var(--firefox-menu-text);
      padding: var(--menu-shell-padding);
      border: 1px solid var(--firefox-menu-border);
      border-radius: var(--menu-shell-radius);
      box-shadow: var(--firefox-menu-shadow);
      z-index: 9000;
      opacity: 0;
      pointer-events: none;
      transition:
        opacity var(--smooth-slide-duration) var(--smooth-slide-ease),
        transform var(--smooth-slide-duration) var(--smooth-slide-ease);
      max-width: min(680px, calc(100vw - 56px));
      text-align: center;
      font: var(--text-font-style) var(--bold_text) var(--menu-item-font-size) var(--text-font-family);
      line-height: 18px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-2px);
    }

    @media (max-width: 860px) {

      }

      .app {
        grid-template-rows: minmax(0, 1fr);
      }
    }
  </style>
