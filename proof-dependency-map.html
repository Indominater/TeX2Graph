        h.textContent = "No node selected";
        const p = document.createElement("div");
        p.className = "meta";
        p.textContent = state.nodes.length ? "Select a node in the graph." : "Paste or open a TeX file to build the graph.";
        els.details.append(h, p);
        if (state.duplicateLabels.length || state.unresolvedRefs.length) {
          const issue = document.createElement("div");
          issue.className = "snippet";
          issue.textContent = [
            state.duplicateLabels.length ? "Duplicate labels:\n" + state.duplicateLabels.slice(0, 8).map((item) => item.label + " -> " + item.first + " / " + item.second).join("\n") : "",
            state.unresolvedRefs.length ? "Unresolved reference labels:\n" + state.unresolvedRefs.slice(0, 12).map((item) => item.from + " -> " + item.ref).join("\n") : ""
          ].filter(Boolean).join("\n\n");
          els.details.appendChild(issue);
        }
        return;
      }

      const h = document.createElement("h2");
      h.textContent = node.title;
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = node.id + " · " + humanType(node.type) + " · line " + node.line;
      const pills = document.createElement("div");
      pills.className = "pill-row";
      const status = document.createElement("span");
      status.className = "pill status-" + node.status;
      status.textContent = "status: " + node.status;
      pills.appendChild(status);
      if (node.isFinal) {
        const final = document.createElement("span");
        final.className = "pill";
        final.textContent = "final";
        pills.appendChild(final);
      }
      if (node.blocked && node.status !== "false") {
        const blocked = document.createElement("span");
        blocked.className = "pill status-blocked";
        blocked.textContent = "blocked by false dependency";
        pills.appendChild(blocked);
      }

      els.details.append(h, meta, pills);
      appendLinkSection("Depends on", node.dependsOn);
      appendLinkSection("Used by", node.dependents);
      if (node.aliases.length > 1) {
        const aliases = document.createElement("div");
        aliases.className = "meta";
        aliases.textContent = "Aliases: " + node.aliases.join(", ");
        els.details.appendChild(aliases);
      }
      if (node.equationLabels?.length) {
        const equationLabels = document.createElement("div");
        equationLabels.className = "meta";
        equationLabels.textContent = "Equation labels: " + node.equationLabels.join(", ");
        els.details.appendChild(equationLabels);
      }
      if (node.refLabels?.length) {
        const refLabels = document.createElement("div");
        refLabels.className = "meta";
        refLabels.textContent = "Reference labels: " + node.refLabels.join(", ");
        els.details.appendChild(refLabels);
      }
      const snippet = document.createElement("div");
      snippet.className = "snippet";
      snippet.textContent = node.snippet;
      els.details.appendChild(snippet);
    }

    function appendLinkSection(title, ids) {
      const heading = document.createElement("div");
      heading.className = "meta";
      heading.textContent = title + " (" + ids.length + ")";
      els.details.appendChild(heading);
      if (!ids.length) return;
      const list = document.createElement("div");
      list.className = "link-list";
      for (const id of ids) {
        const target = state.nodes.find((node) => node.id === id);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = target ? target.title + " · " + target.id : id;
        btn.addEventListener("click", () => selectNode(id, true));
        list.appendChild(btn);
      }
      els.details.appendChild(list);
    }

    function clampZoom(value) {
      return Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, Number(value) || 1));
    }

    function viewportSize() {
      return {
        width: Math.max(1, els.graphScroll.clientWidth || 800),
        height: Math.max(1, els.graphScroll.clientHeight || 600)
      };
    }

    function graphContentInsetLeft() {
      if (!els.sidebar) return 0;
      const graphRect = els.graphScroll.getBoundingClientRect();
      const sidebarRect = els.sidebar.getBoundingClientRect();
      const verticalOverlap = sidebarRect.bottom > graphRect.top && sidebarRect.top < graphRect.bottom;
      if (!verticalOverlap || sidebarRect.width > graphRect.width * 0.8) return 0;
      const overlap = Math.max(0, Math.min(sidebarRect.right, graphRect.right) - graphRect.left);
      return Math.min(Math.round(overlap + 28), Math.max(0, graphRect.width - 160));
    }

    function updateGraphViewportBox() {
      const size = viewportSize();
      els.graphSvg.setAttribute("width", size.width);
      els.graphSvg.setAttribute("height", size.height);
      els.graphSvg.setAttribute("viewBox", "0 0 " + size.width + " " + size.height);
    }

    function formatZoomPercent(value = state.zoom) {
      const pct = Math.max(0, clampZoom(value) * 100);
      if (pct >= 10) return Math.round(pct) + "%";
      if (pct >= 1) return (Math.round(pct * 10) / 10).toFixed(1) + "%";
      return Math.max(0.1, Math.round(pct * 10) / 10) + "%";
    }

    function applyViewportTransform() {
      state.transformRaf = 0;
      updateGraphViewportBox();
      els.graphZoom.setAttribute("transform", "translate(" + state.panX + " " + state.panY + ") scale(" + state.zoom + ")");
      const sliderValue = Math.min(10000, Math.max(1, Math.round(state.zoom * 100)));
      els.zoomRange.value = String(sliderValue);
      els.zoomRange.title = formatZoomPercent();
    }

    function scheduleViewportTransform() {
      if (state.transformRaf) return;
      state.transformRaf = requestAnimationFrame(applyViewportTransform);
    }

    function setViewport(nextZoom, nextPanX, nextPanY) {
      state.zoom = clampZoom(nextZoom);
      state.panX = Number.isFinite(nextPanX) ? nextPanX : state.panX;
      state.panY = Number.isFinite(nextPanY) ? nextPanY : state.panY;
      scheduleViewportTransform();
    }

    function panBy(dx = 0, dy = 0) {
      state.panX += Number(dx) || 0;
      state.panY += Number(dy) || 0;
      scheduleViewportTransform();
    }

    function viewportPointFromClient(clientX, clientY) {
      const rect = els.graphScroll.getBoundingClientRect();
      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    function zoomAroundViewportPoint(viewportX, viewportY, nextZoom) {
      const currentZoom = Math.max(state.zoom || 1, 0.0001);
      const normalizedZoom = clampZoom(nextZoom);
      state.panX = viewportX - (viewportX - state.panX) * (normalizedZoom / currentZoom);
      state.panY = viewportY - (viewportY - state.panY) * (normalizedZoom / currentZoom);
      state.zoom = normalizedZoom;
      scheduleViewportTransform();
    }

    function centerNodeInViewport(node) {
      const size = viewportSize();
      const insetLeft = graphContentInsetLeft();
      const usableWidth = Math.max(160, size.width - insetLeft);
      setViewport(
        state.zoom,
        insetLeft + usableWidth / 2 - (node.x + NODE_W / 2) * state.zoom,
        size.height / 2 - (node.y + NODE_H / 2) * state.zoom
      );
    }

    function renderGraph() {
      clear(els.edgesLayer);
      clear(els.nodesLayer);
      computeBlocked(state.nodes);
      const size = topoLayout(state.nodes, state.edges);
      state.graphWidth = size.width;
      state.graphHeight = size.height;
      updateGraphViewportBox();
      applyViewportTransform();
      els.emptyState.style.display = state.nodes.length ? "none" : "grid";

      const byId = new Map(state.nodes.map((node) => [node.id, node]));
      const focus = selectionFocusSets();
      const renderedEdges = state.edges
        .map((edge) => {
          const from = byId.get(edge.from);
          const to = byId.get(edge.to);
          if (!from || !to) return null;
          const edgeClass = classForEdge(edge, from, to, focus);
          return {
            key: edgeKey(edge.from, edge.to),
            from,
            to,
            edgeClass,
            blockedEdge: isBlockingEdge(edge, from, focus)
          };
        })
        .filter(Boolean);

      assignEdgePortOffsets(renderedEdges);
      renderedEdges.sort((a, b) => focusRenderRank(a.edgeClass) - focusRenderRank(b.edgeClass));

      for (const item of renderedEdges) {
        const { from, to, edgeClass, blockedEdge, fromPortOffset, toPortOffset } = item;
        const path = makeSvg("path", {
          class: edgeClass,
          "data-edge-from": from.id,
          "data-edge-to": to.id,
          d: edgePath(from, to, fromPortOffset, toPortOffset),
          "marker-end": markerForEdgeClass(edgeClass, blockedEdge)
        });
        els.edgesLayer.appendChild(path);
      }

      const renderedNodes = state.nodes
        .map((node, index) => ({
          node,
          index,
          nodeClass: classForNode(node, focus)
        }))
        .sort((a, b) => {
          const rankDelta = focusRenderRank(a.nodeClass) - focusRenderRank(b.nodeClass);
          return rankDelta || a.index - b.index;
        });

      for (const item of renderedNodes) {
        const { node, nodeClass } = item;
        const g = makeSvg("g", {
          class: nodeClass,
          transform: "translate(" + node.x + " " + node.y + ")",
          "data-node-id": node.id,
          tabindex: "0",
          role: "button",
          "aria-label": node.title + ", " + node.status
        });

        const rect = makeSvg("rect", {
          class: "body",
          x: 0,
          y: 0,
          width: NODE_W,
          height: NODE_H,
          rx: UI_RADIUS,
          ry: UI_RADIUS
        });
        g.appendChild(rect);

        g.appendChild(makeSvg("rect", {
          class: "selection-frame",
          x: 0,
          y: 0,
          width: NODE_W,
          height: NODE_H,
          rx: UI_RADIUS,
          ry: UI_RADIUS
        }));

        const typeText = makeSvg("text", { class: "type", x: BOARD_SHELL_PADDING * 2, y: 27 });
        typeText.textContent = humanType(node.type);
        g.appendChild(typeText);

        if (node.isFinal) {
          g.appendChild(makeSvg("path", { class: "final-mark", d: "M " + (NODE_W - 43) + " 54 L " + (NODE_W - 18) + " 54 L " + (NODE_W - 18) + " 78 L " + (NODE_W - 30) + " 71 L " + (NODE_W - 43) + " 78 Z" }));
        }

        g.appendChild(makeStatusSlider(node));

        const titleLines = wrapText(node.title, "title", NODE_TEXT_WIDTH, 3, NODE_TITLE_FALLBACK_MAX_CHARS);
        titleLines.forEach((line, i) => {
          const text = makeSvg("text", { class: "title", x: BOARD_SHELL_PADDING * 2, y: 58 + i * 18 });
          text.textContent = line;
          g.appendChild(text);
        });

        const idLines = wrapIdText(node.id, NODE_ID_MAX_CHARS, 2);
        idLines.forEach((line, i) => {
          const text = makeSvg("text", { class: "id", x: BOARD_SHELL_PADDING * 2, y: NODE_H - 44 + i * 27 });
          text.textContent = line;
          g.appendChild(text);
        });

        g.addEventListener("click", (event) => {
          if (isViewportClickSuppressed()) {
            event.preventDefault();
            event.stopPropagation();
            return;
          }
          event.stopPropagation();
          toggleNodeSelection(node.id);
        });
        g.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            selectNode(node.id, false);
          }
        });
        g.addEventListener("contextmenu", (event) => {
          event.preventDefault();
          event.stopPropagation();
        });
        els.nodesLayer.appendChild(g);
      }

      renderStats();
      renderSummary();
      renderDetails();
    }

    function selectNode(id, scrollIntoView) {
      state.selectedId = id;
      const node = state.nodes.find((item) => item.id === id);
      renderGraph();
      if (scrollIntoView && node) {
        centerNodeInViewport(node);
      }
    }

    function toggleNodeSelection(id) {
      if (state.selectedId === id) {
        clearSelection();
        return;
      }
      selectNode(id, false);
    }

    function clearSelection() {
      if (!state.selectedId) return;
      state.selectedId = null;
      renderGraph();
    }

    function clampMenuCoord(value, size, margin = MENU_VIEWPORT_EDGE_MARGIN) {
      const max = Math.max(margin, window.innerWidth - size - margin);
      return Math.max(margin, Math.min(max, value));
    }

    function clampMenuTop(value, size, margin = MENU_VIEWPORT_EDGE_MARGIN) {
      const max = Math.max(margin, window.innerHeight - size - margin);
      return Math.max(margin, Math.min(max, value));
    }

    function openMenuAt(menu, x, y) {
      delete menu.dataset.pinnedPosition;
      menu.style.left = x + "px";
      menu.style.top = y + "px";
      menu.hidden = false;
      menu.classList.add("visible");
      const rect = menu.getBoundingClientRect();
      menu.style.left = Math.round(clampMenuCoord(x, rect.width)) + "px";
      menu.style.top = Math.round(clampMenuTop(y, rect.height)) + "px";
    }

    function positionMenuTopLeft(menu) {
      const rect = menu.getBoundingClientRect();
      const offset = PINNED_CONTEXT_MENU_EDGE_OFFSET;
      menu.style.left = Math.round(clampMenuCoord(offset, rect.width)) + "px";
      menu.style.top = Math.round(clampMenuTop(offset, rect.height)) + "px";
    }

    function openMenuTopLeft(menu) {
      menu.style.left = "0px";
      menu.style.top = "0px";
      menu.hidden = false;
      menu.classList.add("visible");
      menu.dataset.pinnedPosition = "top-left";
      positionMenuTopLeft(menu);
    }

    function pinContextMenu() {
      els.appActionGroup.hidden = false;
      delete els.contextMenu.dataset.nodeId;
      openMenuTopLeft(els.contextMenu);
    }

    function openContextMenu(event) {
      event.preventDefault();
      event.stopPropagation();
      pinContextMenu();
    }

    function closeContextMenu() {
      delete els.contextMenu.dataset.nodeId;
      if (els.contextMenu.dataset.pinnedPosition === "top-left") {
        els.appActionGroup.hidden = false;
        positionMenuTopLeft(els.contextMenu);
        return;
      }
      els.contextMenu.classList.remove("visible");
      els.contextMenu.hidden = true;
      delete els.contextMenu.dataset.pinnedPosition;
    }

    function isGraphExitWarningArmed() {
      return state.exitWarningArmed;
    }

    function armGraphExitWarning() {
      state.exitWarningArmed = true;
    }

    function disarmGraphExitWarning() {
      state.exitWarningArmed = false;
    }

    function closeUnsavedDialog(result) {
      const resolve = state.unsavedDialogResolve;
      if (!resolve) return;
      els.dialogOverlay.classList.remove("show");
      state.unsavedDialogResolve = null;
      state.unsavedDialogPromise = null;
      resolve(result);
    }

    function showUnsavedDialog() {
      if (state.unsavedDialogPromise) return state.unsavedDialogPromise;
      state.unsavedDialogPromise = new Promise((resolve) => {
        state.unsavedDialogResolve = resolve;
        els.dialogOverlay.classList.add("show");
        requestAnimationFrame(() => {
          try {
            els.dialogCancel.focus({ preventScroll: true });
          } catch {
            els.dialogCancel.focus();
          }
        });
      });
      return state.unsavedDialogPromise;
    }

    async function confirmDirtyBeforeReplacingGraph() {
      if (!isGraphExitWarningArmed()) return true;
      closeContextMenu();
      const choice = await showUnsavedDialog();
      if (choice === "cancel") return false;
      if (choice !== "save") return true;
      return await exportHtml();
    }

    function getPriorStatuses({ includeStored = true, includeCurrent = true } = {}) {
      const prior = {};
      if (includeCurrent) {
        for (const node of state.nodes) prior[node.id] = node.status;
      }
      const stored = includeStored ? loadLocalStatuses() : {};
      return { ...stored, ...prior };
    }

    function runParse(options = {}) {
      const {
        usePriorStatuses = true,
        selectFirstNode = true,
        saveStatuses = true
      } = options;
      const tex = els.texInput.value;
      const priorStatuses = usePriorStatuses ? getPriorStatuses() : {};
      const parsed = parseTex(tex, priorStatuses);
      state.tex = tex;
      state.sourceHash = hashString(tex);
      state.nodes = parsed.nodes;
      state.edges = parsed.edges;
      state.duplicateLabels = parsed.duplicateLabels;
      state.unresolvedRefs = parsed.unresolvedRefs;
      state.selectedId = selectFirstNode ? state.nodes[0]?.id || null : null;
      state.statusClickSuppress = null;
      els.sourceName.textContent = state.sourceName;
      if (saveStatuses) saveLocalStatuses();
      renderGraph();
      fitGraph();
    }

    function scheduleAutoParse() {
      clearTimeout(scheduleAutoParse.timer);
      scheduleAutoParse.timer = setTimeout(runParse, 650);
    }

    function fitGraph() {
      if (!state.nodes.length) return;
      const maxX = Math.max(...state.nodes.map((node) => node.x + NODE_W)) + PAD;
      const maxY = Math.max(...state.nodes.map((node) => node.y + NODE_H)) + PAD;
      const size = viewportSize();
      const insetLeft = graphContentInsetLeft();
      const usableWidth = Math.max(160, size.width - insetLeft - 24);
      const zX = usableWidth / maxX;
      const zY = (size.height - 24) / maxY;
      const zoom = clampZoom(Math.min(zX, zY, 1));
      setViewport(
        zoom,
        insetLeft + (usableWidth - maxX * zoom) / 2,
        (size.height - maxY * zoom) / 2
      );
    }

    function setZoom(value) {
      const size = viewportSize();
      zoomAroundViewportPoint(size.width / 2, size.height / 2, value);
    }

    function hashString(text) {
      let hash = 2166136261;
      for (let i = 0; i < text.length; i += 1) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return (hash >>> 0).toString(16);
    }

    function isGraphData(data) {
      return data?.kind === GRAPH_DATA_KIND || data?.kind === LEGACY_MAP_DATA_KIND;
    }

    function localStatusKey(kind = GRAPH_DATA_KIND) {
      return kind + ":statuses:" + (state.sourceHash || "unsaved");
    }

    function saveLocalStatuses() {
      if (!state.sourceHash && state.tex) state.sourceHash = hashString(state.tex);
      if (!state.sourceHash) return;
      const statuses = {};
      for (const node of state.nodes) statuses[node.id] = node.status;
      try {
        localStorage.setItem(localStatusKey(), JSON.stringify(statuses));
      } catch {
        // localStorage can be unavailable for some file:// privacy settings.
      }
    }

    function loadLocalStatuses() {
      if (!state.sourceHash && els.texInput.value) {
        state.sourceHash = hashString(els.texInput.value);
      }
      if (!state.sourceHash) return {};
      try {
        const stored =
          localStorage.getItem(localStatusKey()) ||
          localStorage.getItem(localStatusKey(LEGACY_MAP_DATA_KIND)) ||
          "{}";
        return JSON.parse(stored) || {};
      } catch {
        return {};
      }
    }

    function exportData() {
      const statusById = {};
      for (const node of state.nodes) statusById[node.id] = node.status;
      return {
        version: 1,
        kind: GRAPH_DATA_KIND,
        exportedAt: new Date().toISOString(),
        sourceName: state.sourceName,
        sourceHash: state.sourceHash,
        tex: els.texInput.value,
        viewport: {
          panX: state.panX,
          panY: state.panY,
          zoom: state.zoom
        },
        statusById,
        nodes: state.nodes,
        edges: state.edges,
        duplicateLabels: state.duplicateLabels,
        unresolvedRefs: state.unresolvedRefs
      };
    }

    function safeJson(data) {
      return JSON.stringify(data, null, 2).replace(/</g, "\\u003c");
    }

    function download(filename, mime, text) {
      const blob = new Blob([text], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function supportsFileSystemAccess() {
      return Boolean(window.showOpenFilePicker && window.showSaveFilePicker);
    }

    function isAbortError(error) {
      return error?.name === "AbortError";
    }

    async function readFileHandle(handle) {
      const file = await handle.getFile();
      return {
        file,
        text: await readFile(file)
      };
    }

    async function canWriteFileHandle(handle) {
      if (!handle) return false;
      const options = { mode: "readwrite" };
      if (await handle.queryPermission?.(options) === "granted") return true;
      return await handle.requestPermission?.(options) === "granted";
    }

    async function writeFileHandle(handle, mime, text) {
      const writable = await handle.createWritable();
      try {
        await writable.write(new Blob([text], { type: mime }));
      } finally {
        await writable.close();
      }
    }

    function baseName(name) {
      return (name || "proof-graph").replace(/\.[^.]+$/, "").replace(/[^\w.-]+/g, "_") || "proof-graph";
    }

    function graphHtmlFilename(name = state.sourceName) {
      return baseName(name) + ".html";
    }

    function randomHexCode(length = 6) {
      const bytes = new Uint8Array(Math.ceil(length / 2));
      if (window.crypto?.getRandomValues) {
        window.crypto.getRandomValues(bytes);
      } else {
        for (let i = 0; i < bytes.length; i += 1) bytes[i] = Math.floor(Math.random() * 256);
      }
      return Array.from(bytes, (byte) => byte.toString(16).padStart(2, "0")).join("").slice(0, length);
    }

    function randomGraphHtmlFilename() {
      return "proogh" + randomHexCode(6) + ".html";
    }

    function defaultGraphHtmlFilename() {
      return randomGraphHtmlFilename();
    }

    function setDocumentTitleForSaveName(filename) {
      const name = String(filename || "").trim();
      if (name) document.title = name;
    }

    function prepareSaveFilename(filename = randomGraphHtmlFilename()) {
      const normalized = normalizeGraphHtmlFilename(filename);
      state.saveTargetName = normalized;
      setDocumentTitleForSaveName(normalized);
      return normalized;
    }

    function normalizeGraphHtmlFilename(name) {
      const trimmed = String(name || "").trim();
      if (!trimmed) return "";
      return /\.(?:html?|proofgraph)$/i.test(trimmed) ? trimmed : trimmed + ".html";
    }

    function currentDocumentFilename() {
      const raw = (window.location.pathname || "").split("/").pop() || "";
      try {
        return decodeURIComponent(raw);
      } catch {
        return raw;
      }
    }

    function openHandleDatabase() {
      return new Promise((resolve, reject) => {
        if (!window.indexedDB) {
          resolve(null);
          return;
        }
        const request = indexedDB.open("proogh-file-handles", 1);
        request.onupgradeneeded = () => {
          request.result.createObjectStore("handles");
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function closeHandleDatabase(db) {
      if (db) db.close();
    }

    async function readStoredSaveFileHandle() {
      const db = await openHandleDatabase();
      if (!db) return null;
      try {
        return await new Promise((resolve, reject) => {
          const request = db.transaction("handles", "readonly").objectStore("handles").get("graph-html");
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error);
        });
      } finally {
        closeHandleDatabase(db);
      }
    }

    async function storeSaveFileHandle(handle) {
      if (!handle) return;
      const db = await openHandleDatabase();
      if (!db) return;
      try {
        await new Promise((resolve, reject) => {
          const transaction = db.transaction("handles", "readwrite");
          transaction.objectStore("handles").put(handle, "graph-html");
          transaction.oncomplete = resolve;
          transaction.onerror = () => reject(transaction.error);
        });
      } finally {
        closeHandleDatabase(db);
      }
    }

    async function clearStoredSaveFileHandle() {
      const db = await openHandleDatabase();
      if (!db) return;
      try {
        await new Promise((resolve, reject) => {
          const transaction = db.transaction("handles", "readwrite");
          transaction.objectStore("handles").delete("graph-html");
          transaction.oncomplete = resolve;
          transaction.onerror = () => reject(transaction.error);
        });
      } finally {
        closeHandleDatabase(db);
      }
    }

    async function restoreSaveFileHandle() {
      if (!supportsFileSystemAccess()) return;
      const generation = state.saveHandleGeneration;
      try {
        const handle = await readStoredSaveFileHandle();
        if (!handle) return;
        if (state.saveHandleGeneration !== generation) return;
        state.saveFileHandle = handle;
        state.saveTargetName = handle.name || state.saveTargetName;
      } catch (error) {
        console.warn("Could not restore saved file handle", error);
      }
    }

    function htmlWithEmbeddedGraphData(data) {
      const selectedId = state.selectedId;
      if (selectedId) {
        state.selectedId = null;
        renderGraph();
      }
      try {
        els.embeddedData.textContent = safeJson(data);
        return "<!doctype html>\n" + document.documentElement.outerHTML;
      } finally {
        els.embeddedData.textContent = "null";
        if (selectedId) {
          state.selectedId = selectedId;
          renderGraph();
        }
      }
    }

    function graphHtmlText() {
      if (!state.nodes.length || state.tex !== els.texInput.value) {
        runParse({ selectFirstNode: false });
      }
      const data = exportData();
      return htmlWithEmbeddedGraphData(data);
    }

    async function saveGraphHtmlToHandle(handle) {
      if (!await canWriteFileHandle(handle)) return false;
      setDocumentTitleForSaveName(handle.name || state.saveTargetName);
      await writeFileHandle(handle, "text/html;charset=utf-8", graphHtmlText());
      state.saveFileHandle = handle;
      state.saveTargetName = handle.name || state.saveTargetName;
      try {
        await storeSaveFileHandle(handle);
      } catch (error) {
        console.warn("Could not remember save file", error);
      }
      return true;
    }

    function saveGraphHtmlDownload(filename) {
      setDocumentTitleForSaveName(filename);
      download(filename, "text/html;charset=utf-8", graphHtmlText());
      return true;
    }

    async function pickGraphHtmlSaveHandle(suggestedName) {
      return await window.showSaveFilePicker({
        suggestedName,
        types: [{
          description: "HTML graph",
          accept: { "text/html": [".html", ".htm"] }
        }]
      });
    }

    async function exportHtml() {
      try {
        if (state.saveFileHandleRestore) {
          await state.saveFileHandleRestore;
          state.saveFileHandleRestore = null;
        }
        if (state.saveFileHandle && await saveGraphHtmlToHandle(state.saveFileHandle)) return true;
        const filename = prepareSaveFilename();
        if (supportsFileSystemAccess()) {
          const handle = await pickGraphHtmlSaveHandle(filename);
          return await saveGraphHtmlToHandle(handle);
        }
        return saveGraphHtmlDownload(filename);
      } catch (error) {
        if (isAbortError(error)) return false;
        console.warn("Could not save graph", error);
        return false;
      }
    }

    async function saveAsHtml() {
      try {
        const suggestedName = prepareSaveFilename(defaultGraphHtmlFilename());
        if (supportsFileSystemAccess()) {
          const handle = await pickGraphHtmlSaveHandle(suggestedName);
          return await saveGraphHtmlToHandle(handle);
        }
        const filename = normalizeGraphHtmlFilename(window.prompt("Save graph as", suggestedName));
        if (!filename) return false;
        return saveGraphHtmlDownload(filename);
      } catch (error) {
        if (isAbortError(error)) return false;
        console.warn("Could not save graph as", error);
        return false;
      }
    }

    function exportJson() {
      if (!state.nodes.length) runParse({ selectFirstNode: false });
      download(baseName(state.sourceName) + ".proofgraph.json", "application/json;charset=utf-8", safeJson(exportData()));
    }

    function setSaveFileHandle(handle, name = "", options = {}) {
      if (options.cancelRestore !== false) {
        state.saveHandleGeneration += 1;
        state.saveFileHandleRestore = null;
      }
      state.saveFileHandle = handle || null;
      state.saveTargetName = handle?.name || name || "";
      if (handle) {
        storeSaveFileHandle(handle).catch((error) => {
          console.warn("Could not remember save file", error);
        });
        return;
      }
      if (options.clearStoredHandle !== false) {
        clearStoredSaveFileHandle().catch((error) => {
          console.warn("Could not clear saved file", error);
        });
      }
    }

    function loadGraphData(data, options = {}) {
      if (!isGraphData(data)) {
        return;
      }
      setSaveFileHandle(options.saveFileHandle || null, options.saveTargetName || "", {
        clearStoredHandle: options.clearStoredHandle,
        cancelRestore: options.cancelRestore
      });
      state.sourceName = data.sourceName || "imported.proofgraph";
      state.sourceHash = data.sourceHash || hashString(data.tex || "");
      state.tex = data.tex || "";
      els.texInput.value = state.tex;
      els.sourceName.textContent = state.sourceName;
      if (Array.isArray(data.nodes) && Array.isArray(data.edges)) {
        const statusById = data.statusById || {};
        state.nodes = data.nodes.map((node) => ({
          ...node,
          aliases: node.aliases || [],
          equationLabels: node.equationLabels || [],
          refLabels: node.refLabels || node.dependencyLabels || [],
          ownedLabels: node.ownedLabels || node.aliases || [],
          status: statusById[node.id] || node.status || "pending",
          dependents: Array.isArray(node.dependents) ? node.dependents : []
        }));
        state.edges = uniqueEdges(data.edges);
        rebuildDependents();
        state.duplicateLabels = data.duplicateLabels || [];
        state.unresolvedRefs = data.unresolvedRefs || [];
        state.selectedId = null;
        if (data.viewport) {
          state.zoom = clampZoom(data.viewport.zoom);
          state.panX = Number.isFinite(data.viewport.panX) ? data.viewport.panX : 0;
          state.panY = Number.isFinite(data.viewport.panY) ? data.viewport.panY : 0;
        }
        saveLocalStatuses();
        renderGraph();
        if (!data.viewport) fitGraph();
      } else {
        runParse({ selectFirstNode: false });
      }
      armGraphExitWarning();
    }

    function rebuildDependents() {
      const byId = new Map(state.nodes.map((node) => [node.id, node]));
      state.nodes.forEach((node) => {
        node.dependents = [];
      });
      for (const edge of state.edges) {
        const from = byId.get(edge.from);
        if (from && !from.dependents.includes(edge.to)) from.dependents.push(edge.to);
      }
      for (const node of state.nodes) {
        node.dependsOn = state.edges.filter((edge) => edge.to === node.id).map((edge) => edge.from);
        node.isLeaf = node.dependsOn.length === 0;
        node.isFinal = node.dependents.length === 0;
      }
    }

    function readFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error);
        reader.readAsText(file);
      });
    }

    function decodeHtmlEntities(text) {
      const textarea = document.createElement("textarea");
      textarea.innerHTML = text;
      return textarea.value;
    }

    function graphDataFromRawJson(raw) {
      const trimmed = String(raw || "").trim();
      if (!trimmed || trimmed === "null") return null;
      const candidates = [trimmed];
      const decoded = decodeHtmlEntities(trimmed);
      if (decoded !== trimmed) candidates.push(decoded);
      for (const candidate of candidates) {
        try {
          const data = JSON.parse(candidate);
          if (isGraphData(data)) return data;
        } catch {
        }
      }
      return null;
    }

    function extractEmbeddedGraphScriptTexts(text) {
      const values = [];
      const scriptPattern = /<script\b[^>]*\bid\s*=\s*(["'])(embedded-(?:graph|map)-data)\1[^>]*>([\s\S]*?)<\/script>/gi;
      let match;
      while ((match = scriptPattern.exec(text))) {
        values.push(match[3]);
      }
      return values;
    }

    function extractGraphJsonFromHtml(text) {
      const doc = new DOMParser().parseFromString(text, "text/html");
      const script = doc.getElementById("embedded-graph-data") || doc.getElementById("embedded-map-data");
      const candidates = [];
      if (script) candidates.push(script.textContent);
      candidates.push(...extractEmbeddedGraphScriptTexts(text));
      for (const raw of candidates) {
        const data = graphDataFromRawJson(raw);
        if (data) return data;
      }
      return null;
    }

    function looksLikeHtmlFile(file, text) {
      const name = (file?.name || "").toLowerCase();
      const type = (file?.type || "").toLowerCase();
      const trimmed = text.trimStart();
      return (
        name.endsWith(".html") ||
        name.endsWith(".htm") ||
        type === "text/html" ||
        /^<!doctype\s+html/i.test(trimmed) ||
        /^<html[\s>]/i.test(trimmed)
      );
    }

    function parseGraphJson(text) {
      return graphDataFromRawJson(text);
    }

    function parseGraphFileData(file, text) {
      const parsers = looksLikeHtmlFile(file, text)
        ? [extractGraphJsonFromHtml, parseGraphJson]
        : [parseGraphJson, extractGraphJsonFromHtml];
      for (const parse of parsers) {
        try {
          const data = parse(text);
          if (isGraphData(data)) return data;
        } catch {
        }
      }
      return null;
    }

    function showNotice(message) {
      if (!els.notice) return;
      clearTimeout(state.noticeTimer);
      els.notice.textContent = message;
      els.notice.hidden = false;
      requestAnimationFrame(() => els.notice.classList.add("visible"));
      state.noticeTimer = setTimeout(() => {
        els.notice.classList.remove("visible");
        state.noticeTimer = setTimeout(() => {
          els.notice.hidden = true;
          state.noticeTimer = 0;
        }, 180);
      }, 3600);
    }

    function openGraphFailureMessage(file, text) {
      const name = file?.name || "that file";
      if (looksLikeHtmlFile(file, text)) {
        return name + " is HTML, but it does not contain a saved Proogh graph.";
      }
      return name + " is not a saved Proogh graph.";
    }

    function isEditableTarget(target) {
      if (!target || target === document.body) return false;
      const tag = target.tagName ? target.tagName.toLowerCase() : "";
      return tag === "input" || tag === "textarea" || tag === "select" || tag === "button" || tag === "a" || target.isContentEditable;
    }

    function handleViewportWheel(event) {
      if (!els.graphScroll.contains(event.target)) return;
      event.preventDefault();
      closeContextMenu();

      if (event.ctrlKey || event.metaKey) {
        const factor = Math.abs(event.deltaY) < 30
          ? Math.pow(0.995, event.deltaY)
          : event.deltaY < 0 ? 1.1 : 1 / 1.1;
        const point = viewportPointFromClient(event.clientX, event.clientY);
        zoomAroundViewportPoint(point.x, point.y, state.zoom * factor);
        return;
      }

      panBy(-event.deltaX, -event.deltaY);
    }

    function suppressMenuZoom(event) {
      event.preventDefault();
      event.stopPropagation();
    }

    function syncSpacePanCursor() {
      els.graphScroll.classList.toggle("space-pan", state.spaceDown && !state.panning);
      els.graphScroll.classList.toggle("panning", state.panning);
    }

    function handleSpaceKeyDown(event) {
      if (event.code !== "Space" || event.repeat || isEditableTarget(event.target)) return;
      state.spaceDown = true;
      event.preventDefault();
      syncSpacePanCursor();
    }

    function handleSpaceKeyUp(event) {
      if (event.code !== "Space") return;
      state.spaceDown = false;
      syncSpacePanCursor();
    }

    function handleEscapeKeyDown(event) {
      if (event.key !== "Escape") return;
      const hadSelection = Boolean(state.selectedId);
      closeContextMenu();
      clearSelection();
      if (hadSelection) event.preventDefault();
    }

    function beginMousePan(event) {
      if (event.button !== 0 || !state.spaceDown) return;
      event.preventDefault();
      closeContextMenu();
      const startX = event.clientX;
      const startY = event.clientY;
      const startPanX = state.panX;
      const startPanY = state.panY;
      state.panning = true;
      syncSpacePanCursor();

      function move(moveEvent) {
        moveEvent.preventDefault();
        setViewport(
          state.zoom,
          startPanX + moveEvent.clientX - startX,
          startPanY + moveEvent.clientY - startY
        );
      }

      function end() {
        state.panning = false;
        syncSpacePanCursor();
        document.removeEventListener("mousemove", move, true);
        document.removeEventListener("mouseup", end, true);
      }

      document.addEventListener("mousemove", move, true);
      document.addEventListener("mouseup", end, true);
    }

    function isTouchViewportPointer(event) {
      return event.pointerType === "touch" || event.pointerType === "pen";
    }

    function activeViewportPointerPoints() {
      return Array.from(state.viewportPointers.values());
    }

    function pointerDistance(a, b) {
      return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    }

    function pointerCenter(a, b) {
      return {
        x: (a.clientX + b.clientX) / 2,
        y: (a.clientY + b.clientY) / 2
      };
    }

    function suppressViewportClick() {
      state.viewportClickSuppressUntil = Math.max(
        state.viewportClickSuppressUntil,
        Date.now() + TOUCH_CLICK_SUPPRESS_MS
      );
    }

    function isViewportClickSuppressed() {
      return Date.now() <= state.viewportClickSuppressUntil;
    }

    function startTouchPanGesture(point) {
      state.touchGesture = {
        mode: "pan",
        lastX: point.clientX,
        lastY: point.clientY,
        totalX: 0,
        totalY: 0,
        moved: false
      };
    }

    function startTouchPinchGesture(points) {
      if (points.length < 2) return;
      const center = pointerCenter(points[0], points[1]);
      const zoom = Math.max(state.zoom || 1, 0.0001);
      state.touchGesture = {
        mode: "pinch",
        centerX: center.x,
        centerY: center.y,
        startDistance: Math.max(1, pointerDistance(points[0], points[1])),
        startZoom: zoom,
        worldX: (center.x - state.panX) / zoom,
        worldY: (center.y - state.panY) / zoom,
        moved: false
      };
    }

    function beginTouchViewportGesture(event) {
      if (!isTouchViewportPointer(event)) return;
      if (event.button !== undefined && event.button !== 0) return;
      state.viewportPointers.set(event.pointerId, {
        clientX: event.clientX,
        clientY: event.clientY
      });
      if (els.graphScroll.setPointerCapture) {
        try {
          els.graphScroll.setPointerCapture(event.pointerId);
        } catch {
          // Some browsers reject capture when a child SVG target owns the pointer.
        }
      }
      const points = activeViewportPointerPoints();
      if (points.length === 1) {
        startTouchPanGesture(points[0]);
      } else if (points.length >= 2) {
        event.preventDefault();
        startTouchPinchGesture(points);
        suppressViewportClick();
      }
    }

    function updateTouchViewportGesture(event) {
      if (!isTouchViewportPointer(event) || !state.viewportPointers.has(event.pointerId)) return;
      const previous = state.viewportPointers.get(event.pointerId);
      state.viewportPointers.set(event.pointerId, {
        clientX: event.clientX,
        clientY: event.clientY
      });

      const points = activeViewportPointerPoints();
      if (points.length === 1) {
        if (!state.touchGesture || state.touchGesture.mode !== "pan") {
          startTouchPanGesture(points[0]);
          return;
        }
        const dx = event.clientX - previous.clientX;
        const dy = event.clientY - previous.clientY;
        state.touchGesture.totalX += dx;
        state.touchGesture.totalY += dy;
        if (
          !state.touchGesture.moved &&
          Math.hypot(state.touchGesture.totalX, state.touchGesture.totalY) >= TOUCH_GESTURE_MOVE_THRESHOLD
        ) {
          state.touchGesture.moved = true;
        }
        if (state.touchGesture.moved) {
          event.preventDefault();
          suppressViewportClick();
          panBy(dx, dy);
        }
        return;
      }

      if (points.length >= 2) {
        if (!state.touchGesture || state.touchGesture.mode !== "pinch") {
          startTouchPinchGesture(points);
        }
        const gesture = state.touchGesture;
        const center = pointerCenter(points[0], points[1]);
        const distance = Math.max(1, pointerDistance(points[0], points[1]));
        const zoom = clampZoom(gesture.startZoom * (distance / gesture.startDistance));
        const moved =
          Math.abs(distance - gesture.startDistance) >= TOUCH_GESTURE_MOVE_THRESHOLD ||
          Math.hypot(center.x - gesture.centerX, center.y - gesture.centerY) >= TOUCH_GESTURE_MOVE_THRESHOLD;
        if (moved) {
          event.preventDefault();
          gesture.moved = true;
          suppressViewportClick();
          setViewport(
            zoom,
            center.x - gesture.worldX * zoom,
            center.y - gesture.worldY * zoom
          );
        }
      }
    }

    function endTouchViewportGesture(event) {
      if (!isTouchViewportPointer(event) || !state.viewportPointers.has(event.pointerId)) return;
      if (state.touchGesture?.moved) {
        event.preventDefault();
        suppressViewportClick();
      }
      if (els.graphScroll.releasePointerCapture) {
        try {
          els.graphScroll.releasePointerCapture(event.pointerId);
        } catch {
        }
      }
      state.viewportPointers.delete(event.pointerId);
      const points = activeViewportPointerPoints();
      if (points.length === 1) {
        startTouchPanGesture(points[0]);
      } else if (points.length >= 2) {
        startTouchPinchGesture(points);
      } else {
        state.touchGesture = null;
      }
    }

    function bootEmbeddedGraph() {
      const documentFilename = currentDocumentFilename();
      if (documentFilename) state.saveTargetName = documentFilename;
      state.saveFileHandleRestore = restoreSaveFileHandle();
      const raw = els.embeddedData.textContent.trim();
      if (!raw || raw === "null") {
        renderGraph();
        disarmGraphExitWarning();
        return;
      }
      try {
        loadGraphData(JSON.parse(raw), {
          saveTargetName: state.saveTargetName,
          clearStoredHandle: false,
          cancelRestore: false
        });
      } catch {
        renderGraph();
      }
    }

    function loadTexText(name, text) {
      state.sourceName = name;
      state.sourceHash = "";
      setSaveFileHandle(null, graphHtmlFilename(name));
      els.texInput.value = text;
      els.sourceName.textContent = name;
      runParse({
        usePriorStatuses: false,
        selectFirstNode: false
      });
      armGraphExitWarning();
    }

    function loadGraphFile(file, text, handle = null) {
      const data = parseGraphFileData(file, text);
      if (!data) {
        showNotice(openGraphFailureMessage(file, text));
        return false;
      }
      const htmlFile = looksLikeHtmlFile(file, text);
      loadGraphData(data, {
        saveTargetName: htmlFile ? file.name : "",
        saveFileHandle: htmlFile ? handle : null,
        clearStoredHandle: Boolean(!handle)
      });
      return true;
    }

    async function openTexFile() {
      if (!await confirmDirtyBeforeReplacingGraph()) return;
      if (!supportsFileSystemAccess()) {
        els.texFile.click();
        return;
      }
      try {
        const [handle] = await window.showOpenFilePicker({
          multiple: false,
          types: [{
            description: "TeX source",
            accept: { "text/plain": [".tex", ".txt"] }
          }]
        });
        const { file, text } = await readFileHandle(handle);
        loadTexText(file.name, text);
      } catch (error) {
        if (!isAbortError(error)) console.warn("Could not open TeX file", error);
      }
    }

    async function openGraphFile() {
      if (!await confirmDirtyBeforeReplacingGraph()) return;
      if (!supportsFileSystemAccess()) {
        els.graphFile.click();
        return;
      }
      try {
        const [handle] = await window.showOpenFilePicker({
          multiple: false,
          types: [{
            description: "Graph files",
            accept: {
              "text/html": [".html", ".htm"],
              "application/json": [".json"],
              "application/octet-stream": [".proofgraph", ".proofmap"]
            }
          }]
        });
        const { file, text } = await readFileHandle(handle);
        loadGraphFile(file, text, handle);
      } catch (error) {
        if (!isAbortError(error)) {
          console.warn("Could not open graph file", error);
          showNotice("Could not open that graph file.");
        }
      }
    }

    async function runContextMenuAction(action) {
      if (action === "open-tex") {
        closeContextMenu();
        await openTexFile();
        return;
      }
      if (action === "open-graph") {
        closeContextMenu();
        await openGraphFile();
        return;
      }
      if (action === "export-html") {
        closeContextMenu();
        await exportHtml();
        return;
      }
      if (action === "save-as") {
        closeContextMenu();
        await saveAsHtml();
      }
    }

    els.unsavedDialog.addEventListener("contextmenu", (event) => {
      event.preventDefault();
      event.stopPropagation();
    });
    els.dialogSave.addEventListener("click", () => closeUnsavedDialog("save"));
    els.dialogDiscard.addEventListener("click", () => closeUnsavedDialog("discard"));
    els.dialogCancel.addEventListener("click", () => closeUnsavedDialog("cancel"));

    window.addEventListener("beforeunload", (event) => {
      if (!isGraphExitWarningArmed()) return;
      event.preventDefault();
      event.returnValue = "";
    });

    els.openTexBtn.addEventListener("click", () => openTexFile());
    els.openGraphBtn.addEventListener("click", () => openGraphFile());
    els.exportHtmlBtn.addEventListener("click", () => exportHtml());
    els.exportJsonBtn.addEventListener("click", exportJson);
    els.fitBtn.addEventListener("click", fitGraph);
    els.texInput.addEventListener("input", () => {
      armGraphExitWarning();
      scheduleAutoParse();
    });
    els.zoomRange.addEventListener("input", () => setZoom(Number(els.zoomRange.value) / 100));
    els.zoomOutBtn.addEventListener("click", () => setZoom(state.zoom / 1.1));
    els.zoomInBtn.addEventListener("click", () => setZoom(state.zoom * 1.1));
    els.graphScroll.addEventListener("wheel", handleViewportWheel, { passive: false });
    els.graphScroll.addEventListener("mousedown", beginMousePan);
    els.graphScroll.addEventListener("pointerdown", beginTouchViewportGesture);
    els.graphScroll.addEventListener("pointermove", updateTouchViewportGesture);
    els.graphScroll.addEventListener("pointerup", endTouchViewportGesture);
    els.graphScroll.addEventListener("pointercancel", endTouchViewportGesture);
    els.graphScroll.addEventListener("click", (event) => {
      if (isViewportClickSuppressed()) {
        event.preventDefault();
        event.stopPropagation();
        return;
      }
      const suppressed = state.statusClickSuppress;
      if (suppressed && Date.now() <= suppressed.until) {
        event.preventDefault();
        event.stopPropagation();
        state.statusClickSuppress = null;
        return;
      }
      if (event.target === els.graphScroll || event.target === els.graphSvg) clearSelection();
    });
    els.graphScroll.addEventListener("contextmenu", (event) => openContextMenu(event));
    els.graphScroll.addEventListener("gesturestart", suppressMenuZoom, { passive: false });
    els.graphScroll.addEventListener("gesturechange", suppressMenuZoom, { passive: false });
    els.graphScroll.addEventListener("gestureend", suppressMenuZoom, { passive: false });

    els.texFile.addEventListener("change", async () => {
      const file = els.texFile.files?.[0];
      if (!file) return;
      const text = await readFile(file);
      loadTexText(file.name, text);
      els.texFile.value = "";
    });

    els.graphFile.addEventListener("change", async () => {
      const file = els.graphFile.files?.[0];
      if (!file) return;
      try {
        const text = await readFile(file);
        loadGraphFile(file, text);
      } catch (error) {
        console.warn("Could not load graph file", error);
        showNotice("Could not open that graph file.");
      } finally {
        els.graphFile.value = "";
      }
    });

    els.contextMenu.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      event.preventDefault();
      event.stopPropagation();
      if (button.dataset.action) runContextMenuAction(button.dataset.action);
    });

    els.contextMenu.addEventListener("contextmenu", (event) => {
      event.preventDefault();
      event.stopPropagation();
    });
    els.contextMenu.addEventListener("wheel", suppressMenuZoom, { passive: false });
    els.contextMenu.addEventListener("gesturestart", suppressMenuZoom, { passive: false });
    els.contextMenu.addEventListener("gesturechange", suppressMenuZoom, { passive: false });
    els.contextMenu.addEventListener("gestureend", suppressMenuZoom, { passive: false });

    document.addEventListener("click", (event) => {
      if (!els.contextMenu.hidden && !els.contextMenu.contains(event.target)) closeContextMenu();
    });

    document.addEventListener("keydown", (event) => {
      handleSaveShortcut(event);
      handleNodeCopyShortcut(event);
      handleEscapeKeyDown(event);
      handleSpaceKeyDown(event);
    });
    document.addEventListener("keyup", handleSpaceKeyUp);

    window.addEventListener("resize", () => {
      if (state.nodes.length) renderGraph();
      else applyViewportTransform();
      if (!els.contextMenu.hidden && els.contextMenu.dataset.pinnedPosition === "top-left") {
        positionMenuTopLeft(els.contextMenu);
      }
    });

    bootEmbeddedGraph();
    pinContextMenu();
  </script>
</body>
</html>
